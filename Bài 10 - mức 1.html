const __fakeListeners = {};
const __makeTs = (ms) => ({ toMillis: () => ms });
const initializeApp = (config) => ({ config });
const getAuth = () => ({ currentUser: { uid: 'local-preview-user' } });
const signInAnonymously = async () => ({ user: { uid: 'local-preview-user' } });

const onAuthStateChanged = (auth, cb) => { setTimeout(() => cb({ uid: 'local-preview-user' }), 0); return () => {}; };
const getFirestore = () => ({ local: true });
const collection = (db, ...parts) => ({ key: parts.join('/') });
const serverTimestamp = () => ({ __serverTimestamp: true });
function __readCollection(key) {
  try { return JSON.parse(localStorage.getItem('quiz_' + key) || '[]'); } catch { return []; }
}
function __writeCollection(key, rows) {
  localStorage.setItem('quiz_' + key, JSON.stringify(rows));
  (__fakeListeners[key] || []).forEach(cb => __emitSnapshot(key, cb));
}
function __emitSnapshot(key, cb) {
  const rows = __readCollection(key);
  cb({ docs: rows.map(row => ({ id: row.id, data: () => ({ ...row, timestamp: row.timestampMillis ? __makeTs(row.timestampMillis) : null }) })) });
}
const addDoc = async (ref, data) => {
  const rows = __readCollection(ref.key);
  const item = { ...data, id: 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2), timestampMillis: Date.now() };
  delete item.timestamp;
  rows.push(item);
  __writeCollection(ref.key, rows);
  return { id: item.id };
};
const onSnapshot = (ref, cb, errCb) => {
  __fakeListeners[ref.key] = __fakeListeners[ref.key] || [];
  __fakeListeners[ref.key].push(cb);
  __emitSnapshot(ref.key, cb);
  return () => { __fakeListeners[ref.key] = (__fakeListeners[ref.key] || []).filter(x => x !== cb); };
};
const doc = (db, ...parts) => ({ key: parts.slice(0, -1).join('/'), id: parts[parts.length - 1] });
const deleteDoc = async (ref) => {
  const rows = __readCollection(ref.key).filter(row => row.id !== ref.id);
  __writeCollection(ref.key, rows);
};

const MathText = ({ text }) => {
  const containerRef = React.useRef(null);

  useEffect(() => {
    const renderMath = () => {
      if (window.renderMathInElement && containerRef.current) {
        window.renderMathInElement(containerRef.current, {
          delimiters: [
            {left: "$$", right: "$$", display: true},
            {left: "$", right: "$", display: false}
          ],
          throwOnError: false
        });
      }
    };

    renderMath();
    window.addEventListener('katex-ready', renderMath);
    return () => window.removeEventListener('katex-ready', renderMath);
  }, [text]);

  return <span ref={containerRef}>{text || ''}</span>;
};

  const [user, setUser] = useState(null);

  const [studentInfo, setStudentInfo] = useState({ name: '', class: '', school: '' });

  // Load KaTeX for Physics/Math formatting
  useEffect(() => {
    if (!document.getElementById('katex-css')) {
      const link = document.createElement('link');
      link.id = 'katex-css';
      link.rel = 'stylesheet';
      link.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css';
      document.head.appendChild(link);

      const script = document.createElement('script');
      script.id = 'katex-js';
      script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js';
      script.onload = () => {
        const autoRender = document.createElement('script');
        autoRender.id = 'katex-auto-render';
        autoRender.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js';
        autoRender.onload = () => window.dispatchEvent(new Event('katex-ready'));
        document.head.appendChild(autoRender);
      };
      document.head.appendChild(script);
    }
  }, []);

  // Firebase Auth
  useEffect(() => {
    if (!auth) return;
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (e) {
        console.error("Auth error", e);
      }
    };
    initAuth();
    const unsubscribe = onAuthStateChanged(auth, setUser);
    return () => unsubscribe();
  }, []);

  // Timer logic
  useEffect(() => {
    let timer;
    if (appState === 'quiz') {
      timer = setInterval(() => {
        setElapsedTime(prev => prev + 1);
      }, 1000);
    }
    return () => clearInterval(timer);
  }, [appState]);

  // Handle Form Input
  const handleStartQuiz = (e) => {
    e.preventDefault();
    if (studentInfo.name && studentInfo.class && studentInfo.school) {
      setAnswers({});
      setElapsedTime(0);
      setAppState('quiz');
    }
  };

  const handleAnswerSelect = (qId, value) => {
    setAnswers(prev => ({ ...prev, [qId]: value }));
  };

  const calculateScore = () => {
    let points = 0;
    quizData.forEach(q => {
      if (q.type === 'tracnghiem' || q.type === 'dungsai') {
        if (answers[q.id] === q.correctOption) points += 1;
      }
    });
    return points;
  };

  const isAllAnswered = useMemo(() => {
    return Object.keys(answers).length === quizData.length;
  }, [answers]);

  const handleSubmitQuiz = async () => {
    if (isSubmitting) return;
    setIsSubmitting(true);
    const finalScore = calculateScore();
    setScore(finalScore);
    
    // Save to Firebase
    if (user && db) {
      try {
        const timeSpent = elapsedTime;
        const resultsRef = collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION_NAME);
        await addDoc(resultsRef, {
          studentName: studentInfo.name,
          studentClass: studentInfo.class,
          studentSchool: studentInfo.school,
          score: finalScore,
          timeSpent: timeSpent,
          answers: answers,
          timestamp: serverTimestamp(),
          userId: user.uid
        });
      } catch (err) {
        console.error("Error saving result", err);
      }
    }
    
    setAppState('result');
    setIsSubmitting(false);
  };

  const formatTime = (seconds) => {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${s < 10 ? '0' : ''}${s}`;
  };

  // Teacher Auth
  const handleTeacherLogin = (e) => {
    e.preventDefault();
    if (teacherPwd === 'admin') {
      setAppState('teacherBoard');
      setTeacherError('');
    } else {
      setTeacherError('Mật khẩu không chính xác!');
    }
  };

  // Fetch Teacher Data
  useEffect(() => {
    if (appState === 'teacherBoard' && user && db) {
      const resultsRef = collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION_NAME);
      const unsubscribe = onSnapshot(resultsRef, (snapshot) => {
        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        // Sort in memory (Rule 2)
        data.sort((a, b) => {
           const timeA = a.timestamp?.toMillis() || 0;
           const timeB = b.timestamp?.toMillis() || 0;
           return timeB - timeA;
        });
        setResultsData(data);
      }, (err) => console.error(err));
      return () => unsubscribe();
    }
  }, [appState, user]);

  // Execute Delete

                    <th className="p-4 font-semibold text-center">Điểm</th>
                    <th className="p-4 font-semibold text-center">Thời gian làm</th>
                    <th className="p-4 font-semibold text-center">Thao tác</th>
                  </tr>
                </thead>
                <tbody className="text-sm">
                  {resultsData.length === 0 ? (
                    <tr>
                      <td colSpan="7" className="p-12 text-center text-slate-500">
                        <BookOpen className="w-12 h-12 mx-auto text-slate-300 mb-3" />
                        Chưa có dữ liệu bài làm nào.
                      </td>
                    </tr>
                  ) : (
                    resultsData.map((res, i) => (
                      <tr key={res.id || i} className="border-b border-slate-100 hover:bg-slate-50 transition-colors group">
                        <td className="p-4 text-slate-500">
                          {res.timestamp ? new Date(res.timestamp.toMillis()).toLocaleString('vi-VN') : 'Đang tải...'}
                        </td>
                        <td className="p-4 font-bold text-slate-800">{res.studentName}</td>
                        <td className="p-4 text-slate-700">{res.studentClass}</td>
                        <td className="p-4 text-slate-600">{res.studentSchool}</td>
                        <td className="p-4 text-center">
                           <span className={`font-bold px-2.5 py-1 rounded-md ${res.score >= 8 ? 'bg-green-100 text-green-700' : res.score >= 5 ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>
                             {res.score}/10
                           </span>
                        </td>
                        <td className="p-4 text-center font-mono text-slate-500">
                          {formatTime(res.timeSpent)}
                        </td>
                        <td className="p-4 text-center">
                          <button 
                            onClick={() => setDeleteTarget(res.id)}
                            className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                            title="Xóa bài làm này"
                          >
                            <Trash2 className="w-4 h-4" />
                          </button>
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
