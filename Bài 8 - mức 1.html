<style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f8fafc;color:#1e293b}button,input,textarea{font:inherit}.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}.bg{background:linear-gradient(135deg,#eff6ff,#e0e7ff)}.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 12px 35px rgba(15,23,42,.1);overflow:hidden}.intro{max-width:576px;width:100%}.hero{position:relative;background:#4f46e5;color:#fff;text-align:center;padding:32px}.hero h1{font-size:30px;margin:12px 0 6px}.hero p{color:#c7d2fe;margin:0;font-size:18px}.pill{display:inline-block;margin-top:12px;padding:5px 12px;border-radius:999px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);font-weight:600;font-size:14px}.content{padding:28px}.muted{color:#64748b}.stack{display:flex;flex-direction:column;gap:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:640px){.grid{grid-template-columns:1fr}.score{flex-direction:column}.divider{display:none}.bool{gap:10px}.hide-sm{display:none}}.info{display:flex;gap:12px;align-items:center;background:#f8fafc;border:1px solid #f1f5f9;border-radius:14px;padding:16px;text-align:left}.btn{border:0;border-radius:12px;padding:12px 18px;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px}.primary{background:#4f46e5;color:white;box-shadow:0 10px 22px rgba(79,70,229,.22)}.primary:hover{background:#4338ca}.secondary{background:#fff;color:#475569;border:1px solid #e2e8f0}.soft{background:#e0e7ff;color:#4338ca}.disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}.form{max-width:448px;width:100%;padding:28px}.label{display:block;font-size:14px;font-weight:700;color:#334155;margin:0 0 6px}.input{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:12px 14px;outline:none}.input:focus,textarea:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.18)}.top{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid #e2e8f0;box-shadow:0 1px 5px rgba(15,23,42,.06);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}.timer{display:flex;gap:8px;align-items:center;padding:6px 14px;border-radius:999px;background:#e0e7ff;color:#4338ca;font-family:monospace;font-size:18px;font-weight:800}.wrap{max-width:768px;margin:24px auto 96px;padding:0 16px;display:flex;flex-direction:column;gap:22px}.qcard{background:#fff;border:1px solid #e2e8f0;border-radius:18px;overflow:hidden;box-shadow:0 1px 5px rgba(15,23,42,.04)}.qhead{background:#f8fafc;border-bottom:1px solid #f1f5f9;padding:12px 18px;display:flex;justify-content:space-between;align-items:center}.tag{text-transform:uppercase;font-size:12px;font-weight:800;color:#475569;background:#e2e8f0;padding:5px 8px;border-radius:7px}.qbody{padding:20px}.qtext{font-size:18px;line-height:1.55;font-weight:700;margin:0 0 16px;color:#0f172a}.option{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid #e2e8f0;border-radius:12px;cursor:pointer;margin-bottom:12px}.option:hover{background:#f8fafc}.option.sel{background:#eef2ff;border-color:#6366f1}.bool{display:flex;gap:16px}.bool button{flex:1;background:#fff;border:1px solid #e2e8f0;color:#475569;padding:16px}.bool .t.sel{background:#f0fdf4;border-color:#22c55e;color:#15803d}.bool .f.sel{background:#fef2f2;border-color:#ef4444;color:#b91c1c}textarea{width:100%;min-height:98px;resize:none;border:1px solid #cbd5e1;border-radius:10px;padding:12px;outline:none}.bottom{position:fixed;left:0;bottom:0;width:100%;z-index:60;background:#fff;border-top:1px solid #e2e8f0;box-shadow:0 -10px 30px rgba(0,0,0,.05);padding:12px 16px}.bottom-inner{max-width:768px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}.result-hero{background:#4f46e5;color:white;padding:46px 16px 88px;text-align:center;border-bottom-left-radius:44px;border-bottom-right-radius:44px;box-shadow:0 12px 28px rgba(79,70,229,.25)}.result-main{max-width:768px;margin:-64px auto 48px;padding:0 16px}.score{background:#fff;border:1px solid #f1f5f9;border-radius:18px;box-shadow:0 10px 25px rgba(15,23,42,.1);padding:26px;display:flex;justify-content:space-around;align-items:center;gap:24px}.score-num{font-size:58px;line-height:1;font-weight:900}.green{color:#22c55e}.amber{color:#f59e0b}.red{color:#dc2626}.divider{width:1px;height:64px;background:#e2e8f0}.ans{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 5px rgba(15,23,42,.06);border:1px solid #bfdbfe;margin-bottom:18px}.ans.ok{border-color:#86efac}.ans.bad{border-color:#fca5a5}.ans-head{padding:9px 14px;display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:700}.ans-head.ok{background:#f0fdf4;color:#166534}.ans-head.bad{background:#fef2f2;color:#991b1b}.ans-head.essay{background:#eff6ff;color:#1e40af}.box{background:#f8fafc;border:1px solid #f1f5f9;border-radius:9px;padding:12px;margin:12px 0}.explain{background:#eef2ff80;border:1px solid #c7d2fe;border-radius:10px;padding:14px}.dash{background:#0f172a;color:white;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:40;box-shadow:0 4px 15px rgba(15,23,42,.18)}.teacher{max-width:1280px;margin:0 auto;padding:24px}.table-card{background:white;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;box-shadow:0 1px 5px rgba(15,23,42,.05)}.table-head{padding:18px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}table{width:100%;border-collapse:collapse;white-space:nowrap}th,td{padding:14px 16px;border-bottom:1px solid #f1f5f9;text-align:left}th{background:#f1f5f9;color:#475569;font-size:14px}tr:hover td{background:#f8fafc}.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}.modal{background:white;border-radius:18px;padding:26px;max-width:420px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,.25)}.math{font-family:'Times New Roman',Times,serif;font-style:italic}.error{position:fixed;left:12px;right:12px;bottom:12px;background:#fee2e2;color:#991b1b;border:1px solid #fecaca;border-radius:10px;padding:12px;z-index:999;display:none}

<script>
const quizData = [{"id": 1, "type": "tracnghiem", "text": "Thấu kính là khối đồng chất trong suốt, thường làm bằng:", "options": ["A. gỗ hoặc giấy.", "B. thủy tinh hoặc nhựa.", "C. sắt hoặc nhôm.", "D. vải hoặc cao su."], "correctOption": 1, "answerText": "B. thủy tinh hoặc nhựa.", "explanation": "Thấu kính là khối đồng chất trong suốt, có thể làm bằng thủy tinh, nhựa để cho ánh sáng truyền qua."}, {"id": 2, "type": "tracnghiem", "text": "Dựa vào hình dạng, thấu kính được chia thành hai loại là:", "options": ["A. thấu kính rìa mỏng và thấu kính rìa dày.", "B. thấu kính đỏ và thấu kính tím.", "C. thấu kính phẳng và thấu kính gương.", "D. thấu kính trong suốt và thấu kính màu đục."], "correctOption": 0, "answerText": "A. thấu kính rìa mỏng và thấu kính rìa dày.", "explanation": "Dựa vào đặc điểm hình dạng hình học ở phần rìa so với phần giữa, người ta chia thành hai loại: rìa mỏng và rìa dày."}, {"id": 3, "type": "tracnghiem", "text": "Thấu kính rìa mỏng còn gọi là:", "options": ["A. thấu kính phân kì.", "B. thấu kính hội tụ.", "C. gương phẳng.", "D. lăng kính."], "correctOption": 1, "answerText": "B. thấu kính hội tụ.", "explanation": "Thấu kính rìa mỏng có tác dụng làm chùm tia tới song song trở thành chùm tia ló hội tụ nên được gọi là thấu kính hội tụ."}, {"id": 4, "type": "tracnghiem", "text": "Quang tâm $O$ của thấu kính là điểm mà:", "options": ["A. mọi tia sáng đi qua nó đều truyền thẳng.", "B. mọi tia sáng đi qua nó đều bị phản xạ.", "C. mọi tia sáng đi qua nó đều bị hấp thụ.", "D. mọi tia sáng đi qua nó đều bị đổi màu."], "correctOption": 0, "answerText": "A. mọi tia sáng đi qua nó đều truyền thẳng.", "explanation": "Quang tâm $O$ là điểm đặc biệt nằm trong thấu kính mà mọi tia sáng đi qua nó đều tiếp tục truyền thẳng, không bị khúc xạ."}, {"id": 5, "type": "tracnghiem", "text": "Tiêu cự $f$ của thấu kính là:", "options": ["A. khoảng cách từ vật đến thấu kính.", "B. khoảng cách từ ảnh đến thấu kính.", "C. khoảng cách từ quang tâm đến tiêu điểm chính.", "D. khoảng cách giữa vật và ảnh."], "correctOption": 2, "answerText": "C. khoảng cách từ quang tâm đến tiêu điểm chính.", "explanation": "Tiêu cự $f$ là khoảng cách đo từ quang tâm $O$ đến tiêu điểm chính $F$ của thấu kính ($f = OF = OF'$)."}, {"id": 6, "type": "dungsai", "text": "Thấu kính bắt buộc phải là một khối đồng chất và trong suốt.", "correctOption": "Đúng", "answerText": "Đúng", "explanation": "Để ánh sáng có thể truyền qua và xảy ra hiện tượng khúc xạ tạo ảnh, thấu kính phải làm từ vật liệu trong suốt và đồng chất."}, {"id": 7, "type": "dungsai", "text": "Thấu kính rìa dày có tác dụng làm chùm tia tới song song trở thành chùm tia ló hội tụ.", "correctOption": "Sai", "answerText": "Sai", "explanation": "Thấu kính rìa dày làm chùm tia tới song song trở thành chùm tia ló phân kì (nên gọi là thấu kính phân kì)."}, {"id": 8, "type": "dungsai", "text": "Tiêu cự $f$ của thấu kính là khoảng cách đo từ vật đến ảnh của nó.", "correctOption": "Sai", "answerText": "Sai", "explanation": "Tiêu cự là khoảng cách từ quang tâm $O$ đến tiêu điểm chính $F$, không phải là khoảng cách từ vật đến ảnh."}, {"id": 9, "type": "dungsai", "text": "Đối với thấu kính hội tụ, tia tới song song với trục chính thì tia ló sẽ đi qua tiêu điểm chính.", "correctOption": "Đúng", "answerText": "Đúng", "explanation": "Đây là một trong những tia sáng đặc biệt khi truyền qua thấu kính hội tụ."}, {"id": 10, "type": "dungsai", "text": "Đối với thấu kính phân kì, tia tới song song với trục chính thì tia ló có đường kéo dài đi qua tiêu điểm chính.", "correctOption": "Đúng", "answerText": "Đúng", "explanation": "Vì chùm tia ló bị phân kì, nên chính đường kéo dài ngược lại của các tia ló này mới cắt nhau tại tiêu điểm chính $F$."}, {"id": 11, "type": "tuluan", "text": "Nêu khái niệm thấu kính.", "answerText": "Thấu kính là khối đồng chất trong suốt, thường làm bằng thủy tinh hoặc nhựa, được giới hạn bởi hai mặt cong hoặc một mặt cong và một mặt phẳng.", "explanation": "Định nghĩa dựa vào chất liệu (trong suốt, đồng chất) và hình dạng hình học giới hạn."}, {"id": 12, "type": "tuluan", "text": "Dựa vào hình dạng, thấu kính được chia thành mấy loại? Kể tên.", "answerText": "Dựa vào hình dạng, thấu kính được chia thành hai loại: thấu kính rìa mỏng và thấu kính rìa dày.", "explanation": "Phân loại cơ bản nhất dựa vào độ dày của phần rìa so với phần ở giữa."}, {"id": 13, "type": "tuluan", "text": "Nêu cách nhận biết thấu kính hội tụ dựa vào đường truyền của chùm sáng.", "answerText": "Thấu kính hội tụ là thấu kính rìa mỏng. Khi chiếu chùm sáng song song với trục chính qua thấu kính rìa mỏng, ta thu được chùm tia ló hội tụ tại một điểm (tiêu điểm).", "explanation": "Đặc điểm quang học đặc trưng nhất của thấu kính hội tụ."}, {"id": 14, "type": "tuluan", "text": "Nêu cách nhận biết thấu kính phân kì dựa vào đường truyền của chùm sáng.", "answerText": "Thấu kính phân kì là thấu kính rìa dày. Khi chiếu chùm sáng song song với trục chính qua thấu kính rìa dày, ta thu được chùm tia ló phân kì.", "explanation": "Đặc điểm quang học đặc trưng nhất của thấu kính phân kì."}, {"id": 15, "type": "tuluan", "text": "Nêu khái niệm quang tâm, trục chính, tiêu điểm chính và tiêu cự của thấu kính.", "answerText": "Quang tâm $O$ là điểm mà mọi tia sáng đi qua nó đều truyền thẳng. Trục chính là đường thẳng đi qua $O$ và vuông góc với bề mặt thấu kính. Tiêu điểm chính $F$ là điểm trên trục chính mà tia tới song song trục chính cho tia ló (hoặc đường kéo dài) đi qua. Tiêu cự $f$ là khoảng cách từ $O$ đến $F$.", "explanation": "Các thông số và điểm đặc trưng cơ bản cấu thành nên hệ thống quang học của một thấu kính."}];
const DB_KEY = 'khtn9_quiz_results_b8_lvl1_basic';
let appState='intro', studentInfo={name:'',class:'',school:''}, answers={}, elapsedTime=0, score=0, teacherError='', deleteTarget=null, timerId=null;
window.onerror=(m,s,l)=>{const e=document.getElementById('err');e.style.display='block';e.textContent='Lỗi hiển thị: '+m+' (dòng '+l+')'};
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function mt(v){return esc(v??'').replace(/\$([^$]+)\$/g,(_,m)=>'<span class="math">'+m.replace(/\\cdot/g,'·').replace(/\\text\{([^}]+)\}/g,'$1')+'</span>')}
function fmt(t){const m=Math.floor(t/60),s=t%60;return `${m}:${s<10?'0':''}${s}`}
function setState(s){appState=s;timer();render()}
function timer(){if(timerId){clearInterval(timerId);timerId=null} if(appState==='quiz')timerId=setInterval(()=>{elapsedTime++;const t=document.getElementById('timer');if(t)t.textContent=fmt(elapsedTime)},1000)}
function calc(){let p=0;quizData.forEach(q=>{if((q.type==='tracnghiem'||q.type==='dungsai')&&answers[q.id]===q.correctOption)p++});return p}
function allAnswered(){return Object.keys(answers).length===quizData.length}
function setAnswer(id,val){answers[id]=val;render()}
function startQuiz(ev){ev.preventDefault();const n=document.getElementById('name').value.trim(),c=document.getElementById('cls').value.trim(),s=document.getElementById('school').value.trim();if(!n||!c||!s)return;studentInfo={name:n,class:c,school:s};answers={};elapsedTime=0;setState('quiz')}
function submitQuiz(){if(!allAnswered())return;score=calc();const list=JSON.parse(localStorage.getItem(DB_KEY)||'[]');list.push({id:'local_'+Date.now(),studentName:studentInfo.name,studentClass:studentInfo.class,studentSchool:studentInfo.school,score,timeSpent:elapsedTime,answers,timestampMillis:Date.now()});localStorage.setItem(DB_KEY,JSON.stringify(list));setState('result')}
function teacherLogin(ev){ev.preventDefault();if(document.getElementById('pwd').value==='admin'){teacherError='';setState('teacherBoard')}else{teacherError='Mật khẩu không chính xác!';render()}}
function del(id){deleteTarget=id;render()}
function confirmDelete(){let list=JSON.parse(localStorage.getItem(DB_KEY)||'[]');list=deleteTarget==='all'?[]:list.filter(x=>x.id!==deleteTarget);localStorage.setItem(DB_KEY,JSON.stringify(list));deleteTarget=null;render()}
function intro(){return `<div class="center bg"><div class="card intro"><div class="hero"><div style="font-size:54px">🏆</div><h1>Đấu Trường Tri Thức</h1><p>Chủ đề: Ánh Sáng - KHTN 9</p><span class="pill">Bài 8: Thấu kính (Mức 1 - Cơ bản)</span></div><div class="content stack" style="text-align:center;gap:22px"><p class="muted">Chào mừng bạn đến với hệ thống ôn tập tương tác. Hãy vận dụng trí nhớ và kiến thức vật lý nền tảng để vượt qua 15 thử thách cơ bản!</p><div class="grid"><div class="info">📄<div><b>15 Câu hỏi</b><br><small class="muted">Trắc nghiệm & Tự luận</small></div></div><div class="info">⏱<div><b>Tự do</b><br><small class="muted">Không giới hạn thời gian</small></div></div></div><button class="btn primary" onclick="setState('form')">Vào Thi Ngay ➡</button><button class="btn secondary" onclick="setState('teacherAuth')">🛡 Chế độ Giáo viên</button></div></div></div>`}
function form(){return `<div class="center"><div class="card form"><div style="text-align:center;margin-bottom:22px"><div style="font-size:42px">👤</div><h2>Thông tin thí sinh</h2><p class="muted">Vui lòng điền đầy đủ thông tin để bắt đầu</p></div><form onsubmit="startQuiz(event)" class="stack"><div><label class="label">Họ và tên</label><input id="name" required class="input" value="${esc(studentInfo.name)}" placeholder="VD: Nguyễn Văn A"></div><div><label class="label">Lớp</label><input id="cls" required class="input" value="${esc(studentInfo.class)}" placeholder="VD: 9A1"></div><div><label class="label">Trường</label><input id="school" required class="input" value="${esc(studentInfo.school)}" placeholder="VD: THCS Lê Quý Đôn"></div><div style="display:flex;gap:12px;padding-top:12px"><button type="button" class="btn secondary" style="flex:1" onclick="setState('intro')">Quay lại</button><button class="btn primary" style="flex:2">▶ Bắt đầu</button></div></form></div></div>`}
function qhtml(q,i){const label=q.type==='tuluan'?'Tự Luận':q.type==='tracnghiem'?'Trắc Nghiệm':'Đúng/Sai';let inp='';if(q.type==='tracnghiem')inp=q.options.map((o,j)=>`<label class="option ${answers[q.id]===j?'sel':''}"><input type="radio" name="q-${q.id}" ${answers[q.id]===j?'checked':''} onchange="setAnswer(${q.id},${j})"><span>${mt(o)}</span></label>`).join('');else if(q.type==='dungsai')inp=`<div class="bool"><button class="btn t ${answers[q.id]==='Đúng'?'sel':''}" onclick="setAnswer(${q.id},'Đúng')">Đúng</button><button class="btn f ${answers[q.id]==='Sai'?'sel':''}" onclick="setAnswer(${q.id},'Sai')">Sai</button></div>`;else inp=`<textarea placeholder="Nhập câu trả lời của bạn vào đây..." oninput="setAnswer(${q.id},this.value)">${esc(answers[q.id]||'')}</textarea>`;return `<div class="qcard"><div class="qhead"><b>Câu ${i+1}</b><span class="tag">${label}</span></div><div class="qbody"><p class="qtext">${mt(q.text)}</p>${inp}</div></div>`}
function quiz(){return `<div><div class="top"><div><b style="color:#3730a3">Đấu Trường Tri Thức</b><br><small class="muted"><b>${esc(studentInfo.name)}</b> - ${esc(studentInfo.class)}</small></div><div class="timer">⏱ <span id="timer">${fmt(elapsedTime)}</span></div></div><div class="wrap">${quizData.map(qhtml).join('')}</div><div class="bottom"><div class="bottom-inner"><div>Đã trả lời: <b style="color:#4f46e5">${Object.keys(answers).length}</b> / ${quizData.length}</div><button class="btn ${allAnswered()?'primary':'disabled'}" ${allAnswered()?'':'disabled'} onclick="submitQuiz()">Nộp Bài <span class="hide-sm">Ngay</span> ☑</button></div></div></div>`}
function result(){const good=score>=8;return `<div><div class="result-hero"><h1>Kết quả của bạn</h1><p style="color:#c7d2fe">${esc(studentInfo.name)} - Lớp ${esc(studentInfo.class)}</p></div><div class="result-main"><div class="score"><div style="text-align:center"><p class="muted"><b>Điểm trắc nghiệm</b></p><span class="score-num ${good?'green':'amber'}">${score}</span><span style="font-size:26px;color:#94a3b8">/10</span><p class="muted"><small>*Tự luận chờ GV chấm</small></p></div><div class="divider"></div><div style="text-align:center"><p class="muted"><b>Thời gian</b></p><b style="font-size:32px">${fmt(elapsedTime)}</b></div></div><div style="text-align:center;margin:26px 0"><button class="btn soft" onclick="answers={};setState('intro')">🔄 Thi lại (Cải thiện điểm)</button></div><h2>📖 ĐÁP ÁN CHI TIẾT</h2>${quizData.map(ans).join('')}</div></div>`}
function ans(q,i){const obj=q.type==='tracnghiem'||q.type==='dungsai', ok=obj&&answers[q.id]===q.correctOption, cls=obj?(ok?'ok':'bad'):'essay', label=q.type==='tuluan'?'Tự Luận':q.type==='tracnghiem'?'Trắc Nghiệm':'Đúng/Sai', stu=q.type==='tracnghiem'&&answers[q.id]!==undefined?q.options[answers[q.id]]:answers[q.id];return `<div class="ans ${cls}"><div class="ans-head ${cls}"><span>Câu ${i+1}: ${label}</span><span>${obj?(ok?'✅':'❌'):'Chờ chấm'}</span></div><div class="qbody"><p><b>${mt(q.text)}</b></p><div class="box"><small class="muted">Bài làm của bạn:</small><br><b class="${obj?(ok?'green':'red'):''}">${stu?mt(stu):'<span class="muted"><i>Không có câu trả lời</i></span>'}</b></div><div class="explain"><b style="color:#3730a3">Đáp án gợi ý / Chính xác:</b><p><b>${mt(q.answerText)}</b></p><p class="muted">⚠️ <b>Giải thích:</b> ${mt(q.explanation)}</p></div></div></div>`}
function teacherAuth(){return `<div class="center" style="background:#1e293b"><div class="card form" style="background:#0f172a;border-color:#334155;color:#cbd5e1"><div style="text-align:center"><div style="font-size:42px">🛡</div><h2 style="color:white">Chế Độ Giáo Viên</h2><p class="muted">Vui lòng nhập mật khẩu quản trị viên</p></div><form onsubmit="teacherLogin(event)" class="stack"><input id="pwd" type="password" class="input" style="background:#1e293b;color:white;border-color:#475569" placeholder="Mật khẩu (admin)">${teacherError?`<p style="color:#f87171;text-align:center">${esc(teacherError)}</p>`:''}<button class="btn" style="background:#0d9488;color:white">Đăng nhập hệ thống</button><button type="button" class="btn" style="background:transparent;color:#94a3b8" onclick="teacherError='';setState('intro')">Quay lại giao diện học sinh</button></form></div></div>`}
function teacherBoard(){const data=JSON.parse(localStorage.getItem(DB_KEY)||'[]').sort((a,b)=>(b.timestampMillis||0)-(a.timestampMillis||0));return `<div>${deleteTarget?modal():''}<div class="dash"><div style="display:flex;gap:12px;align-items:center"><span style="font-size:28px">🛡</span><div><b>Bảng Điều Khiển Giáo Viên</b><br><small style="color:#94a3b8">Hệ thống lượng giá KHTN 9 - Bài 8 (Mức 1)</small></div></div><button class="btn" style="background:#1e293b;color:white;border:1px solid #334155" onclick="setState('intro')">↩ Thoát</button></div><div class="teacher"><div class="table-card"><div class="table-head"><h2>Thống kê bài làm học sinh (Cơ bản)</h2><div><span style="background:#ccfbf1;color:#115e59;padding:7px 10px;border-radius:8px;font-weight:800">Tổng cộng: ${data.length} lượt</span> ${data.length?'<button class="btn" style="background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:8px 10px" onclick="del(\'all\')">🗑 Xóa tất cả</button>':''}</div></div><div style="overflow-x:auto"><table><thead><tr><th>Thời gian nộp</th><th>Họ Tên</th><th>Lớp</th><th>Trường</th><th>Điểm</th><th>Thời gian làm</th><th>Thao tác</th></tr></thead><tbody>${data.length?data.map(r=>`<tr><td class="muted">${new Date(r.timestampMillis).toLocaleString('vi-VN')}</td><td><b>${esc(r.studentName)}</b></td><td>${esc(r.studentClass)}</td><td>${esc(r.studentSchool)}</td><td><b>${r.score}/10</b></td><td style="font-family:monospace">${fmt(r.timeSpent)}</td><td><button class="btn" style="padding:6px 8px;background:#fff;color:#dc2626" onclick="del('${r.id}')">🗑</button></td></tr>`).join(''):'<tr><td colspan="7" style="text-align:center;padding:44px;color:#64748b">📖<br>Chưa có dữ liệu bài làm nào.</td></tr>'}</tbody></table></div></div></div></div>`}
function modal(){return `<div class="modal-bg"><div class="modal"><h3>⚠️ Xác nhận xóa</h3><p class="muted">${deleteTarget==='all'?'Bạn có chắc chắn muốn xóa TẤT CẢ dữ liệu bài làm của học sinh không? Hành động này không thể hoàn tác.':'Bạn có chắc chắn muốn xóa bài làm của học sinh này khỏi hệ thống không?'}</p><div style="display:flex;justify-content:flex-end;gap:10px"><button class="btn secondary" onclick="deleteTarget=null;render()">Hủy bỏ</button><button class="btn" style="background:#dc2626;color:white" onclick="confirmDelete()">Xóa dữ liệu</button></div></div></div>`}
function render(){const r=document.getElementById('root'); if(appState==='intro')r.innerHTML=intro(); else if(appState==='form')r.innerHTML=form(); else if(appState==='quiz')r.innerHTML=quiz(); else if(appState==='result')r.innerHTML=result(); else if(appState==='teacherAuth')r.innerHTML=teacherAuth(); else if(appState==='teacherBoard')r.innerHTML=teacherBoard()}
render();
</script>
</body>
</html>
