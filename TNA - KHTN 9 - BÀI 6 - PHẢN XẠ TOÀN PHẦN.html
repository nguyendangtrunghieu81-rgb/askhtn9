<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thí nghiệm ảo: Phản xạ toàn phần</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (Dịch JSX sang JS) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- ICONS (Thay thế cho lucide-react để chạy trực tiếp trên trình duyệt) ---
        const Icon = ({ children, size = 24, className = "" }) => (
          <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Play = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3"></polygon></Icon>;
        const Square = (p) => <Icon {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></Icon>;
        const RotateCcw = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></Icon>;
        const Target = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></Icon>;
        const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></Icon>;
        const CheckCircle = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></Icon>;
        const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></Icon>;
        const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></Icon>;
        const HelpCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></Icon>;
        const Eye = (p) => <Icon {...p}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></Icon>;
        const Hand = (p) => <Icon {...p}><path d="M18 11V6a2 2 0 0 0-4 0v4"/><path d="M14 10V4a2 2 0 0 0-4 0v6"/><path d="M10 10.5V3a2 2 0 0 0-4 0v9"/><path d="M11.5 21a17.4 17.4 0 0 1-8.5-4L2 16.5A1.5 1.5 0 0 1 3 14l3.5 1.5"/><path d="M6.5 15.5v-10a2 2 0 0 1 4 0v1.5"/><path d="M18 11v4a6 6 0 0 1-6 6h-1a17.4 17.4 0 0 1-8.5-4"/></Icon>;

        // --- MAIN COMPONENT ---
        const PhanXaToanPhan = () => {
          // --- STATE ---
          const [angleI, setAngleI] = useState(20);
          const [medium, setMedium] = useState('glass'); // 'glass' hoặc 'water'
          const [isPlaying, setIsPlaying] = useState(false);
          const [showLabels, setShowLabels] = useState(true);
          
          // Trạng thái cho Thử thách
          const [challengeMode, setChallengeMode] = useState(false);
          const [challengeResult, setChallengeResult] = useState(null);
          
          // Trạng thái cho phần Câu hỏi củng cố
          const [revealedAnswers, setRevealedAnswers] = useState({});

          // Trạng thái cho tương tác Kéo-Thả Laser
          const svgRef = useRef(null);
          const [isDragging, setIsDragging] = useState(false);
          
          const timerRef = useRef(null);

          // --- HẰNG SỐ VẬT LÝ ---
          const n_air = 1.00;
          const n_glass = 1.50;
          const n_water = 1.33;

          const n1 = medium === 'glass' ? n_glass : n_water;
          const n2 = n_air;
          
          // Tính góc giới hạn (đơn vị: độ)
          const i_th = useMemo(() => Math.asin(n2 / n1) * (180 / Math.PI), [n1, n2]);

          // Tính góc khúc xạ r (đơn vị: độ)
          const angleR = useMemo(() => {
            if (angleI > i_th) return null; // Không có khúc xạ
            const sinR = (n1 / n2) * Math.sin(angleI * Math.PI / 180);
            return Math.asin(Math.min(sinR, 1)) * (180 / Math.PI);
          }, [angleI, i_th, n1, n2]);

          // Tính toán cường độ/độ sáng (Mô hình định tính theo SGK)
          const intensityReflected = useMemo(() => {
            if (angleI >= i_th) return 1;
            return Math.min(1, Math.pow(angleI / i_th, 4) + 0.1);
          }, [angleI, i_th]);

          const intensityRefracted = useMemo(() => {
            if (angleI >= i_th) return 0;
            return Math.max(0, 1 - Math.pow(angleI / i_th, 6));
          }, [angleI, i_th]);

          // Phân loại trạng thái để hiển thị phản hồi
          const status = useMemo(() => {
            if (angleI < i_th - 2) return 'khuc_xa';
            if (angleI >= i_th - 2 && angleI <= i_th + 0.5) return 'toi_han';
            return 'phan_xa_toan_phan';
          }, [angleI, i_th]);

          // --- LOGIC ĐIỀU KHIỂN ---
          const handlePlayPause = () => {
            if (isPlaying) {
              clearInterval(timerRef.current);
              setIsPlaying(false);
            } else {
              setIsPlaying(true);
              timerRef.current = setInterval(() => {
                setAngleI(prev => {
                  if (prev >= 80) {
                    clearInterval(timerRef.current);
                    setIsPlaying(false);
                    return 80;
                  }
                  return parseFloat((prev + 0.5).toFixed(1));
                });
              }, 50);
            }
          };

          const handleReset = () => {
            clearInterval(timerRef.current);
            setIsPlaying(false);
            setAngleI(0);
            setChallengeMode(false);
            setChallengeResult(null);
          };

          const startChallenge = () => {
            handleReset();
            setChallengeMode(true);
            setMedium(Math.random() > 0.5 ? 'glass' : 'water');
            setAngleI(15);
          };

          const checkChallenge = () => {
            const error = Math.abs(angleI - i_th);
            if (error <= 1.5) {
              setChallengeResult({ type: 'success', text: `Xuất sắc! Góc giới hạn chính xác là ${i_th.toFixed(1)}°. Bạn đã tìm rất chuẩn.` });
            } else if (error <= 5) {
              setChallengeResult({ type: 'warning', text: `Khá gần! Góc giới hạn thực tế là ${i_th.toFixed(1)}°. Hãy điều chỉnh thêm chút nữa.` });
            } else {
              setChallengeResult({ type: 'error', text: `Chưa chính xác. Tia khúc xạ phải vừa vặn biến mất. Hãy thử kéo lại thanh trượt!` });
            }
          };

          useEffect(() => {
            return () => clearInterval(timerRef.current);
          }, []);

          const toggleAnswer = (idx) => {
            setRevealedAnswers(prev => ({ ...prev, [idx]: true }));
          };

          // --- LOGIC TƯƠNG TÁC CHUỘT/CẢM ỨNG (KÉO LASER) ---
          const svgCenter = 250;
          
          const handlePointerDown = (e) => {
            setIsDragging(true);
            // Dừng chế độ chạy tự động nếu đang bật
            if (isPlaying) handlePlayPause();
            e.target.setPointerCapture?.(e.pointerId);
          };

          const handlePointerMove = (e) => {
            if (!isDragging || !svgRef.current) return;
            
            const rect = svgRef.current.getBoundingClientRect();
            // Khung viewBox là: -30 -30 560 560 -> Tổng width/height = 560
            const scaleX = 560 / rect.width;
            const scaleY = 560 / rect.height;

            const svgX = (e.clientX - rect.left) * scaleX - 30;
            const svgY = (e.clientY - rect.top) * scaleY - 30;

            const dx = svgCenter - svgX;
            const dy = svgY - svgCenter;

            let rad = Math.atan2(dx, dy);
            let deg = rad * (180 / Math.PI);

            // Giới hạn góc từ 0 đến 80 độ
            if (deg < 0) deg = 0;
            if (deg > 80) deg = 80;

            // Làm tròn góc đến 0.5 độ
            setAngleI(parseFloat((Math.round(deg * 2) / 2).toFixed(1)));
          };

          const handlePointerUp = (e) => {
            setIsDragging(false);
            e.target.releasePointerCapture?.(e.pointerId);
          };

          // --- DATA CÂU HỎI ---
          const quizQuestions = [
            { q: "1. Góc khúc xạ lớn hơn hay nhỏ hơn góc tới trong thí nghiệm này?", a: <><strong>Lớn hơn.</strong> Vì ánh sáng truyền từ môi trường chiết suất lớn (thuỷ tinh/nước) sang môi trường chiết suất nhỏ (không khí), tia khúc xạ bị lệch xa pháp tuyến hơn.</> },
            { q: "2. Khi nào sẽ xảy ra hiện tượng chỉ có tia phản xạ?", a: <>Khi góc tới i <strong>lớn hơn</strong> góc giới hạn i<sub>th</sub>.</> },
            { q: "3. Phản xạ toàn phần là gì?", a: <>Là hiện tượng <strong>phản xạ toàn bộ tia sáng tới</strong>, xảy ra ở mặt phân cách giữa hai môi trường trong suốt.</> },
            { q: "4. Điều kiện để xảy ra phản xạ toàn phần là gì?", a: <>Gồm 2 điều kiện:<br/>- Ánh sáng truyền từ môi trường có chiết suất lớn sang môi trường có chiết suất nhỏ hơn (n<sub>1</sub> &gt; n<sub>2</sub>).<br/>- Góc tới phải lớn hơn hoặc bằng góc giới hạn (i ≥ i<sub>th</sub>).</> },
            { q: "5. So sánh góc giới hạn của Thuỷ tinh-Không khí và Nước-Không khí?", a: <>Góc giới hạn của Thuỷ tinh-Không khí (≈ 41.8°) <strong>nhỏ hơn</strong> của Nước-Không khí (≈ 48.8°) vì chiết suất của thuỷ tinh lớn hơn nước.</> },
            { q: "6. Nếu chiếu ánh sáng từ Không khí vào Thuỷ tinh thì có xảy ra phản xạ toàn phần không?", a: <><strong>KHÔNG.</strong> Vì không khí có chiết suất nhỏ hơn thuỷ tinh, vi phạm điều kiện 1 của phản xạ toàn phần (n<sub>1</sub> &gt; n<sub>2</sub>). Tia khúc xạ luôn tồn tại và góc khúc xạ sẽ nhỏ hơn góc tới.</> },
          ];

          // --- TẠO SVG DRAWING ---
          const radius = 180;
          
          const getPoint = (angleDeg, r, isBottom = false) => {
            const rad = angleDeg * Math.PI / 180;
            const signY = isBottom ? 1 : -1;
            return {
              x: svgCenter - r * Math.sin(rad),
              y: svgCenter + signY * r * Math.cos(rad)
            };
          };

          // Điểm đặt đèn laser (mép ngoài vòng chia độ)
          const laserTipPoint = getPoint(angleI, radius + 30, true);
          
          // Chiều dài tia sáng vô tận (1000px) để không bao giờ bị cắt cụt giữa chừng
          const refPoint = getPoint(-angleI, 1000, true);
          const refrPoint = angleR !== null ? getPoint(-angleR, 1000, false) : null;

          const renderAngleArc = (angleDeg, radiusArc, isBottom, color) => {
            if (angleDeg === 0) return null;
            const startPoint = getPoint(0, radiusArc, isBottom);
            const endPoint = getPoint(isBottom ? angleDeg : -angleDeg, radiusArc, isBottom);
            const largeArcFlag = angleDeg > 180 ? 1 : 0;
            const sweepFlag = isBottom ? 0 : 1; 
            
            return (
              <path 
                d={`M ${startPoint.x} ${startPoint.y} A ${radiusArc} ${radiusArc} 0 ${largeArcFlag} ${sweepFlag} ${endPoint.x} ${endPoint.y}`}
                fill="none" stroke={color} strokeWidth="2" strokeDasharray="4 2"
              />
            );
          };

          // Component phụ trợ vẽ text góc với Mũ Chuẩn (Toán học)
          const AngleWithHat = ({ label, value, color, x, y, isApostrophe = false }) => (
            <g transform={`translate(${x}, ${y})`} className="select-none pointer-events-none">
              <text x="0" y="0" fontSize="15" fill={color} fontWeight="bold">
                <tspan fontStyle="italic" fontFamily="serif">{label}</tspan>
                {isApostrophe && <tspan>'</tspan>}
                <tspan> = {value.toFixed(1)}°</tspan>
              </text>
              {/* Vẽ đường gấp khúc tạo thành cái mũ (hat) */}
              <path d="M 1 -14 L 3.5 -18 L 6 -14" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
            </g>
          );

          return (
            <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-3 sm:p-5 md:p-8">
              <div className="max-w-7xl mx-auto space-y-6">
                
                {/* Header */}
                <div className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-200">
                  <h1 className="text-2xl md:text-4xl font-bold text-blue-700 mb-2">Thí nghiệm ảo: Phản xạ toàn phần</h1>
                  <p className="text-gray-600 text-sm md:text-base">Hỗ trợ học tập Vật lí THCS - Quan sát hiện tượng ánh sáng truyền từ môi trường chiết quang hơn sang môi trường kém chiết quang.</p>
                </div>

                <div className="grid grid-cols-1 xl:grid-cols-12 gap-6">
                  
                  {/* CỘT TRÁI: MÔ PHỎNG SVG */}
                  <div className="xl:col-span-7 bg-white rounded-xl shadow-sm border border-gray-200 p-2 sm:p-4 flex flex-col items-center relative overflow-hidden">
                    <h2 className="text-xl font-semibold mb-4 text-center flex items-center gap-2">
                      Khu vực Quan sát
                      <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded-full flex items-center gap-1 font-normal animate-pulse">
                        <Hand size={14} /> Có thể kéo thả Laser
                      </span>
                    </h2>
                    
                    <div className="w-full max-w-[550px] aspect-square flex justify-center items-center relative">
                      
                      <svg 
                        ref={svgRef}
                        viewBox="-30 -30 560 560" 
                        className={`w-full h-full bg-slate-50 rounded-lg border border-gray-100 shadow-inner touch-none ${isDragging ? 'cursor-grabbing' : ''}`}
                        onPointerMove={handlePointerMove}
                        onPointerUp={handlePointerUp}
                        onPointerLeave={handlePointerUp}
                      >
                        <defs>
                          <radialGradient id="glassGradient" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stopColor={medium === 'glass' ? '#e0f2fe' : '#cffafe'} stopOpacity="0.8"/>
                            <stop offset="100%" stopColor={medium === 'glass' ? '#bae6fd' : '#a5f3fc'} stopOpacity="0.9"/>
                          </radialGradient>
                        </defs>

                        {/* Vòng chia độ */}
                        <circle cx={svgCenter} cy={svgCenter} r={radius + 30} fill="#f8fafc" stroke="#e2e8f0" strokeWidth="2" />
                        {[...Array(36)].map((_, i) => {
                          const a = i * 10;
                          const p1 = getPoint(a, radius + 20, true);
                          const p2 = getPoint(a, radius + 30, true);
                          return (
                            <g key={i}>
                              <line x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} stroke="#cbd5e1" strokeWidth={a % 30 === 0 ? 2 : 1} />
                              {a % 30 === 0 && (
                                 <text x={p2.x} y={p2.y} fontSize="11" fill="#94a3b8" textAnchor="middle" dy={p2.y > svgCenter ? 14 : -6}>{Math.abs(a > 180 ? 360-a : a)}°</text>
                              )}
                            </g>
                          );
                        })}

                        {/* Bản bán trụ (Môi trường dưới) */}
                        <path 
                          d={`M ${svgCenter - radius} ${svgCenter} A ${radius} ${radius} 0 0 0 ${svgCenter + radius} ${svgCenter} Z`}
                          fill="url(#glassGradient)" stroke="#7dd3fc" strokeWidth="2"
                        />

                        {/* Môi trường trên (Không khí) */}
                        <text x="0" y="20" fontSize="16" fill="#64748b" fontWeight="bold">Không khí (n = 1.00)</text>
                        
                        {/* Nhãn môi trường dưới */}
                        <text x="0" y="480" fontSize="16" fill="#0369a1" fontWeight="bold">
                          {medium === 'glass' ? 'Thuỷ tinh (n = 1.50)' : 'Nước (n = 1.33)'}
                        </text>

                        {/* Mặt phân cách */}
                        <line x1="-30" y1={svgCenter} x2="530" y2={svgCenter} stroke="#334155" strokeWidth="2" />

                        {/* Pháp tuyến */}
                        <line x1={svgCenter} y1="-30" x2={svgCenter} y2="530" stroke="#94a3b8" strokeWidth="2" strokeDasharray="8 6" />
                        {showLabels && <text x={svgCenter + 12} y="10" fontSize="14" fill="#64748b">Pháp tuyến</text>}

                        {/* Vùng tia sáng */}
                        <g id="rays" className="pointer-events-none">
                          {/* Tia tới (Từ phía sau của hộp laser chiếu thẳng đến đúng tâm) */}
                          <line x1={getPoint(angleI, radius + 60, true).x} y1={getPoint(angleI, radius + 60, true).y} 
                                x2={svgCenter} y2={svgCenter} stroke="#ef4444" strokeWidth="4" />
                          
                          {/* Mũi tên chỉ hướng tia tới */}
                          <polygon points={`${svgCenter},${svgCenter} ${svgCenter-6},${svgCenter+8} ${svgCenter+6},${svgCenter+8}`} 
                                   fill="#ef4444" 
                                   transform={`rotate(${angleI} ${svgCenter} ${svgCenter}) translate(0, 110)`} />

                          {/* Tia khúc xạ (Kéo dài ra vô tận) */}
                          {angleR !== null && (
                            <line x1={svgCenter} y1={svgCenter} x2={refrPoint.x} y2={refrPoint.y} 
                                  stroke="#ef4444" strokeWidth="4" strokeOpacity={intensityRefracted} />
                          )}

                          {/* Tia phản xạ (Kéo dài ra vô tận) */}
                          <line x1={svgCenter} y1={svgCenter} x2={refPoint.x} y2={refPoint.y} 
                                stroke="#ef4444" strokeWidth="4" strokeOpacity={intensityReflected} />
                                
                          {/* Chấm sáng đỏ ngay vị trí giao điểm (nhấn mạnh tia sáng chạm tới mặt phẳng) */}
                          <circle cx={svgCenter} cy={svgCenter} r="4" fill="#ef4444" />
                        </g>

                        {/* Hộp Đèn Lazer - NAY ĐÃ CÓ THỂ KÉO THẢ */}
                        <g 
                          transform={`translate(${laserTipPoint.x}, ${laserTipPoint.y}) rotate(${angleI})`} 
                          onPointerDown={handlePointerDown}
                          className={`transition-opacity ${isDragging ? 'cursor-grabbing opacity-80' : 'cursor-grab hover:opacity-80'}`}
                        >
                          {/* Vùng đệm trong suốt giúp dễ dàng bấm chạm dính trên điện thoại */}
                          <rect x="-30" y="-10" width="60" height="70" fill="transparent" />
                          
                          {/* Thân hộp */}
                          <rect x="-16" y="0" width="32" height="46" rx="4" fill="#1e293b" />
                          <rect x="-12" y="8" width="24" height="6" rx="2" fill="#334155" />
                          {/* Nút bấm */}
                          <circle cx="0" cy="30" r="5" fill="#94a3b8" />
                          {/* Mũi phát tia */}
                          <rect x="-6" y="-6" width="12" height="6" rx="1" fill="#ef4444" />
                        </g>

                        {/* Góc & Nhãn */}
                        {showLabels && (
                          <g id="angles-labels">
                            {/* Góc tới i */}
                            {renderAngleArc(angleI, 40, true, "#3b82f6")}
                            <AngleWithHat label="i" value={angleI} color="#3b82f6" x={svgCenter - 65} y={svgCenter + 65} />

                            {/* Góc khúc xạ r */}
                            {angleR !== null && angleI > 5 && (
                              <>
                                {renderAngleArc(angleR, 50, false, "#16a34a")}
                                <AngleWithHat label="r" value={angleR} color="#16a34a" x={svgCenter + 25} y={svgCenter - 60} />
                              </>
                            )}

                            {/* Góc phản xạ i' */}
                            {angleI > 5 && (
                              <g opacity={intensityReflected > 0.3 ? 1 : 0.5}>
                                 <AngleWithHat label="i" value={angleI} color="#ea580c" x={svgCenter + 35} y={svgCenter + 80} isApostrophe={true} />
                              </g>
                            )}
                          </g>
                        )}

                        {/* Hiệu ứng Phản xạ toàn phần */}
                        {status === 'phan_xa_toan_phan' && (
                          <text x={svgCenter} y={svgCenter - 30} fontSize="18" fill="#dc2626" fontWeight="bold" textAnchor="middle" className="animate-pulse pointer-events-none">
                            PHẢN XẠ TOÀN PHẦN
                          </text>
                        )}
                        {status === 'toi_han' && (
                          <text x={svgCenter} y={svgCenter - 30} fontSize="16" fill="#ca8a04" fontWeight="bold" textAnchor="middle" className="pointer-events-none">
                            TRẠNG THÁI TỚI HẠN (Góc giới hạn)
                          </text>
                        )}
                      </svg>
                    </div>
                  </div>

                  {/* CỘT PHẢI: BẢNG ĐIỀU KHIỂN & PHẢN HỒI */}
                  <div className="xl:col-span-5 flex flex-col gap-5 md:gap-6">
                    
                    {/* Control Panel */}
                    <div className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-200">
                      <h2 className="text-lg md:text-xl font-semibold mb-4 flex items-center gap-2">
                        <Target size={20} className="text-blue-600"/> Điều khiển Thí nghiệm
                      </h2>
                      
                      <div className="space-y-6">
                        <div>
                          <label className="block text-sm md:text-base font-medium text-gray-700 mb-2">
                            Kéo thanh trượt hoặc kéo hộp Laser trên hình: <span className="text-blue-600 font-bold ml-1 text-lg">{angleI.toFixed(1)}°</span>
                          </label>
                          {/* Slider to và dễ bấm trên di động */}
                          <input 
                            type="range" 
                            min="0" max="80" step="0.5" 
                            value={angleI} 
                            onChange={(e) => setAngleI(parseFloat(e.target.value))}
                            disabled={isPlaying}
                            className="w-full h-3 md:h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600 touch-none"
                          />
                          <div className="flex justify-between text-xs text-gray-500 mt-2 font-medium">
                            <span>0°</span>
                            <span>45°</span>
                            <span>80°</span>
                          </div>
                        </div>

                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">Chọn cặp môi trường (Chiết suất n<sub>1</sub> &gt; n<sub>2</sub>):</label>
                          <div className="flex flex-col sm:flex-row gap-3">
                            <button 
                              onClick={() => { setMedium('glass'); setChallengeMode(false); }}
                              className={`flex-1 py-3 sm:py-2 px-4 rounded-lg border text-sm font-medium transition-all duration-200 ${medium === 'glass' ? 'bg-blue-50 border-blue-500 text-blue-700 shadow-sm' : 'bg-white border-gray-300 text-gray-700 hover:bg-gray-50'}`}
                            >
                              Thuỷ tinh ➔ Không khí
                            </button>
                            <button 
                              onClick={() => { setMedium('water'); setChallengeMode(false); }}
                              className={`flex-1 py-3 sm:py-2 px-4 rounded-lg border text-sm font-medium transition-all duration-200 ${medium === 'water' ? 'bg-blue-50 border-blue-500 text-blue-700 shadow-sm' : 'bg-white border-gray-300 text-gray-700 hover:bg-gray-50'}`}
                            >
                              Nước ➔ Không khí
                            </button>
                          </div>
                        </div>

                        <div className="flex flex-wrap gap-3 pt-2">
                          <button onClick={handlePlayPause} className="flex-1 min-w-[140px] flex justify-center items-center gap-2 bg-blue-600 text-white px-4 py-3 sm:py-2 rounded-lg hover:bg-blue-700 transition font-medium">
                            {isPlaying ? <Square size={18}/> : <Play size={18}/>}
                            {isPlaying ? 'Dừng mô phỏng' : 'Chạy tự động'}
                          </button>
                          <button onClick={handleReset} className="flex-1 min-w-[100px] flex justify-center items-center gap-2 bg-gray-200 text-gray-800 px-4 py-3 sm:py-2 rounded-lg hover:bg-gray-300 transition font-medium">
                            <RotateCcw size={18}/> Đặt lại
                          </button>
                          <button onClick={() => setShowLabels(!showLabels)} className="flex-1 min-w-[120px] flex justify-center items-center gap-2 border border-gray-300 text-gray-700 px-4 py-3 sm:py-2 rounded-lg hover:bg-gray-50 transition font-medium">
                            {showLabels ? 'Ẩn nhãn' : 'Hiện nhãn'}
                          </button>
                        </div>
                      </div>
                    </div>

                    {/* Phản hồi Sư phạm Tự động */}
                    <div className={`p-4 md:p-5 rounded-xl shadow-sm border transition-colors duration-300 ${status === 'phan_xa_toan_phan' ? 'bg-red-50 border-red-200' : status === 'toi_han' ? 'bg-yellow-50 border-yellow-200' : 'bg-green-50 border-green-200'}`}>
                      <h3 className="font-semibold flex items-center gap-2 mb-2">
                        <Info size={18} className={status === 'phan_xa_toan_phan' ? 'text-red-600' : status === 'toi_han' ? 'text-yellow-600' : 'text-green-600'}/>
                        Gợi ý quan sát
                      </h3>
                      <p className="text-gray-700 text-sm md:text-base leading-relaxed">
                        {status === 'khuc_xa' && (
                          angleI < 10 ? "Bạn đang để góc tới rất nhỏ. Hãy từ từ tăng góc tới i lên bằng thanh kéo hoặc nắm kéo tia laser và chú ý độ sáng của tia khúc xạ, phản xạ."
                          : "Tia khúc xạ đang mờ dần, trong khi tia phản xạ sáng dần lên. Chú ý rằng góc khúc xạ r luôn lớn hơn góc tới i."
                        )}
                        {status === 'toi_han' && (
                          <strong>Đang ở rất gần Góc giới hạn (i &approx; i<sub>th</sub>)! Tia khúc xạ gần như đi sát mặt phân cách và sắp biến mất. Tia phản xạ đang rất sáng.</strong>
                        )}
                        {status === 'phan_xa_toan_phan' && (
                          <span>Góc tới <strong>{angleI.toFixed(1)}&deg;</strong> đã lớn hơn góc giới hạn. Tia khúc xạ hoàn toàn biến mất, chỉ còn tia phản xạ. <strong>Đây là hiện tượng phản xạ toàn phần!</strong></span>
                        )}
                      </p>
                      {!challengeMode && (
                        <div className="mt-3 text-sm text-gray-500 italic bg-white/50 p-2 rounded">
                          Gợi ý: Góc giới hạn lý thuyết của cặp môi trường này là {i_th.toFixed(1)}&deg;.
                        </div>
                      )}
                    </div>

                    {/* Chế độ Thử thách */}
                    <div className="bg-purple-50 p-5 md:p-6 rounded-xl shadow-sm border border-purple-200">
                      <h2 className="text-lg font-bold text-purple-800 mb-2 flex items-center gap-2">
                        <Target size={20}/> Thử thách học tập
                      </h2>
                      <p className="text-sm text-purple-700 mb-4">Hệ thống đã ẩn giá trị góc giới hạn thực tế. Hãy kéo thanh trượt để tự tìm góc giới hạn.</p>
                      {!challengeMode ? (
                        <button onClick={startChallenge} className="w-full bg-purple-600 text-white px-4 py-3 sm:py-2 rounded-lg hover:bg-purple-700 transition font-medium">
                          Bắt đầu Thử thách
                        </button>
                      ) : (
                        <div className="space-y-3">
                          <button onClick={checkChallenge} className="w-full bg-green-500 text-white px-4 py-3 sm:py-2 rounded-lg hover:bg-green-600 transition font-medium flex justify-center items-center gap-2 shadow-sm">
                            <CheckCircle size={18}/> Bấm để Kiểm tra kết quả
                          </button>
                          {challengeResult && (
                            <div className={`p-3 rounded-lg text-sm font-medium flex gap-2 items-start ${challengeResult.type === 'success' ? 'bg-green-100 text-green-800' : challengeResult.type === 'warning' ? 'bg-yellow-100 text-yellow-800' : 'bg-red-100 text-red-800'}`}>
                               <AlertCircle size={18} className="mt-0.5 shrink-0"/>
                               <span>{challengeResult.text}</span>
                            </div>
                          )}
                          <button onClick={() => setChallengeMode(false)} className="text-sm font-medium text-purple-600 hover:text-purple-800 underline text-center w-full block py-2">Thoát thử thách</button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>

                {/* CỘT DƯỚI: DATA & LÝ THUYẾT */}
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-2">
                  
                  {/* Bảng Dữ liệu */}
                  <div className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col">
                    <h2 className="text-lg md:text-xl font-semibold mb-4 flex items-center gap-2 text-blue-800">
                      <BookOpen size={20} /> Bảng 6.1. Ghi chép thí nghiệm
                    </h2>
                    <div className="overflow-x-auto rounded-lg border border-gray-200">
                      <table className="w-full text-sm md:text-base text-left border-collapse min-w-[500px]">
                        <thead className="bg-gray-100 text-gray-700">
                          <tr>
                            <th className="border-b p-3 md:p-4 w-1/3">Góc tới i</th>
                            <th className="border-b border-l p-3 md:p-4 w-1/3">Tia khúc xạ</th>
                            <th className="border-b border-l p-3 md:p-4 w-1/3">Tia phản xạ</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr className={`transition-colors ${status === 'khuc_xa' ? "bg-blue-50 font-medium" : ""}`}>
                            <td className="border-b p-3 md:p-4">i nhỏ <span className="text-xs text-gray-500 block font-normal">(i &lt; i<sub>th</sub>)</span></td>
                            <td className="border-b border-l p-3 md:p-4 text-gray-600">Độ sáng giảm dần khi tăng i</td>
                            <td className="border-b border-l p-3 md:p-4 text-gray-600">Độ sáng tăng dần khi tăng i</td>
                          </tr>
                          <tr className={`transition-colors ${status === 'toi_han' ? "bg-yellow-50 font-medium" : ""}`}>
                            <td className="border-b p-3 md:p-4">i = i<sub>th</sub> <span className="text-xs text-gray-500 block font-normal">(Trạng thái tới hạn)</span></td>
                            <td className="border-b border-l p-3 md:p-4 text-gray-600">Bắt đầu không nhìn thấy <br/><span className="text-xs text-gray-500">(đi sát mặt phân cách)</span></td>
                            <td className="border-b border-l p-3 md:p-4 text-red-600 font-semibold">Rất sáng</td>
                          </tr>
                          <tr className={`transition-colors ${status === 'phan_xa_toan_phan' ? "bg-red-50 font-medium" : ""}`}>
                            <td className="p-3 md:p-4">i &gt; i<sub>th</sub></td>
                            <td className="border-l p-3 md:p-4 text-red-500 font-semibold">Không còn nhìn thấy</td>
                            <td className="border-l p-3 md:p-4 text-red-600 font-semibold">Rất sáng</td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                    
                    <div className="mt-auto pt-6">
                      <div className="bg-blue-50 p-4 rounded-lg border border-blue-100">
                        <h3 className="font-semibold text-blue-800 mb-2">Ứng dụng thực tế: Cáp quang</h3>
                        <p className="text-sm md:text-base text-gray-700">
                          Sợi cáp quang gồm phần lõi (chiết suất lớn) và phần vỏ (chiết suất nhỏ hơn). Tín hiệu ánh sáng truyền vào lõi với góc tới lớn hơn góc giới hạn, dẫn đến hiện tượng <strong>phản xạ toàn phần liên tục</strong> dọc theo sợi cáp, giúp ánh sáng truyền đi rất xa mà không bị thất thoát ra ngoài.
                        </p>
                      </div>
                    </div>
                  </div>

                  {/* Trắc nghiệm / Câu hỏi cuối bài */}
                  <div className="bg-white p-5 md:p-6 rounded-xl shadow-sm border border-gray-200">
                    <h2 className="text-lg md:text-xl font-semibold mb-4 flex items-center gap-2 text-green-800">
                      <HelpCircle size={20} /> Câu hỏi củng cố
                    </h2>
                    <p className="text-sm text-gray-600 mb-4">Hãy tự suy nghĩ và trả lời trước khi bấm xem đáp án nhé!</p>
                    
                    <div className="h-[450px] overflow-y-auto pr-2 space-y-4 text-sm md:text-base text-gray-800 scrollbar-thin">
                      {quizQuestions.map((item, index) => (
                        <div key={index} className="bg-white border border-gray-200 shadow-sm p-4 rounded-lg hover:border-gray-300 transition-colors">
                          <p className="font-semibold text-gray-900 leading-snug mb-3">{item.q}</p>
                          
                          {revealedAnswers[index] ? (
                            <div className="bg-green-50/50 border-l-4 border-green-500 p-3 rounded-r-md text-gray-700 animate-in fade-in slide-in-from-top-2 duration-300">
                              <span className="font-semibold text-green-800 mr-2">Đáp án:</span>
                              {item.a}
                            </div>
                          ) : (
                            <button 
                              onClick={() => toggleAnswer(index)}
                              className="flex items-center gap-2 text-blue-600 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-md font-medium transition-colors border border-transparent hover:border-blue-200"
                            >
                              <Eye size={16}/> Xem đáp án
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                    
                    <div className="mt-4 pt-3 border-t text-center">
                      <p className="text-xs text-gray-400">Cuộn để xem thêm câu hỏi</p>
                    </div>
                  </div>

                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PhanXaToanPhan />);
    </script>
</body>
</html>
