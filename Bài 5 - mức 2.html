const quizData = [
  { id: 1, type: 'tracnghiem', text: "Khi ánh sáng truyền từ không khí vào nước theo phương xiên góc, tia khúc xạ:", options: ["A. lệch xa pháp tuyến hơn tia tới.","B. lệch gần pháp tuyến hơn tia tới.","C. luôn trùng với tia phản xạ.","D. luôn nằm trong không khí."], correctOption: 1, answerText: "B. lệch gần pháp tuyến hơn tia tới.", explanation: "Nước chiết quang hơn không khí nên khi ánh sáng truyền từ không khí vào nước, góc khúc xạ nhỏ hơn góc tới. Tia khúc xạ lệch gần pháp tuyến hơn tia tới." },
  { id: 2, type: 'tracnghiem', text: "Khi ánh sáng truyền từ nước ra không khí theo phương xiên góc thì:", options: ["A. góc khúc xạ lớn hơn góc tới.","B. góc khúc xạ nhỏ hơn góc tới.","C. góc khúc xạ luôn bằng 0.","D. không có tia khúc xạ."], correctOption: 0, answerText: "A. góc khúc xạ lớn hơn góc tới.", explanation: "Khi ánh sáng truyền từ môi trường chiết quang hơn (nước) sang môi trường chiết quang kém hơn (không khí), tia khúc xạ lệch xa pháp tuyến nên góc khúc xạ lớn hơn góc tới." },
  { id: 3, type: 'tracnghiem', text: "Một người dùng kẹp gắp viên bi dưới đáy chậu đầy nước thường khó xác định đúng vị trí viên bi vì:", options: ["A. viên bi không phản xạ ánh sáng.","B. ánh sáng từ viên bi đến mắt bị khúc xạ, làm vị trí ảnh khác vị trí thật.","C. nước làm viên bi mất màu.","D. tia sáng không truyền được trong nước."], correctOption: 1, answerText: "B. ánh sáng từ viên bi đến mắt bị khúc xạ, làm vị trí ảnh khác vị trí thật.", explanation: "Ánh sáng từ viên bi truyền từ nước ra không khí bị khúc xạ tại mặt phân cách, làm người quan sát nhìn thấy ảnh ảo của viên bi ở vị trí khác (thường dâng cao hơn) vị trí thật." },
  { id: 4, type: 'tracnghiem', text: "Khi góc tới tăng thì góc khúc xạ:", options: ["A. luôn giảm.","B. cũng tăng.","C. không thay đổi.","D. luôn bằng góc tới."], correctOption: 1, answerText: "B. cũng tăng.", explanation: "Khi góc tới tăng thì góc khúc xạ cũng tăng (hàm đồng biến), nhưng không tỉ lệ thuận đơn giản với góc tới mà tuân theo định luật sin." },
  { id: 5, type: 'tracnghiem', text: "Một đồng xu đặt trong chậu. Khi chưa có nước thì không nhìn thấy đồng xu, nhưng khi đổ nước vào lại nhìn thấy đồng xu. Nguyên nhân là do:", needsImage: true, imageNote: "Hình ảnh mô tả thí nghiệm đặt đồng xu trong chậu.", options: ["A. có sự khúc xạ ánh sáng.","B. có sự phản xạ toàn phần.","C. đồng xu tự phát sáng.","D. nước làm đồng xu nổi lên."], correctOption: 0, answerText: "A. có sự khúc xạ ánh sáng.", explanation: "Khi có nước, ánh sáng từ đồng xu truyền qua mặt phân cách nước - không khí và bị khúc xạ, lệch phương truyền nên lọt được vào mắt người quan sát đang ở vị trí khuất." },
  { id: 6, type: 'dungsai', text: "Khi ánh sáng truyền từ không khí vào nước theo phương xiên góc, tia khúc xạ lệch gần pháp tuyến hơn tia tới.", correctOption: "Đúng", answerText: "Đúng", explanation: "Khi truyền từ không khí vào nước (môi trường chiết quang hơn), tia sáng bị bẻ gập lại gần pháp tuyến nên góc khúc xạ nhỏ hơn góc tới." },
  { id: 7, type: 'dungsai', text: "Khi ánh sáng truyền từ nước ra không khí, tia khúc xạ vẫn nằm hoàn toàn trong nước.", correctOption: "Sai", answerText: "Sai", explanation: "Tia nằm lại trong nước là tia phản xạ. Còn tia khúc xạ bắt buộc phải đi xuyên sang môi trường thứ hai (là không khí) và bị gãy khúc." },
  { id: 8, type: 'dungsai', text: "Khi nhìn một con cá trong bể có thành thủy tinh, tia sáng từ cá đến mắt không chịu hiện tượng khúc xạ lần nào.", correctOption: "Sai", answerText: "Sai", explanation: "Tia sáng đi từ cá phải truyền qua nước, qua lớp thành thủy tinh rồi mới ra không khí để đến mắt, nên nó bị khúc xạ tại nhiều mặt phân cách khác nhau." },
  { id: 9, type: 'dungsai', text: "Chiết suất tuyệt đối của môi trường càng lớn thì vận tốc ánh sáng truyền trong môi trường đó càng nhỏ.", correctOption: "Đúng", answerText: "Đúng", explanation: "Theo công thức n = c/v, chiết suất (n) và vận tốc ánh sáng trong môi trường đó (v) tỉ lệ nghịch. Môi trường càng chiết quang, ánh sáng đi càng chậm." },
  { id: 10, type: 'dungsai', text: "Khúc xạ ánh sáng được ứng dụng rộng rãi để giải thích các hiện tượng thực tế và thiết kế các dụng cụ quang học như kính mắt, lăng kính, kính lúp...", correctOption: "Đúng", answerText: "Đúng", explanation: "Đây là nguyên lý nền tảng để chế tạo các thấu kính dùng trong kính mắt, máy ảnh, kính hiển vi và giải thích hiện tượng nhìn sai vị trí vật dưới nước." },
  { id: 11, type: 'tuluan', text: "Giải thích vì sao khi nhìn viên sỏi dưới đáy chậu nước, ta thường thấy ảnh của viên sỏi không đúng vị trí thật.", answerText: "Ánh sáng từ viên sỏi truyền từ nước ra không khí bị khúc xạ tại mặt phân cách. Do tia sáng đổi phương truyền, mắt ta nhận tia khúc xạ (kéo dài ngược lại) và nhìn thấy ảnh ảo của viên sỏi ở vị trí khác (thường nông hơn) vị trí thật.", explanation: "Kiểm tra khả năng vận dụng hiện tượng khúc xạ để giải thích ảo giác về vị trí không gian." },
  { id: 12, type: 'tuluan', text: "Vì sao khi bắt cá dưới nước, đâm lao theo phương thẳng đứng từ trên xuống sẽ dễ chính xác hơn so với đâm theo phương xiên?", answerText: "Các tia sáng từ cá truyền theo phương vuông góc với mặt phân cách nước - không khí thì truyền thẳng. Khi bắt thẳng đứng, ảnh và vật nằm trên cùng một đường thẳng nên xác định vị trí tương đối chính xác hơn so với nhìn xiên (bị khúc xạ làm sai lệch nhiều).", explanation: "Vận dụng kiến thức trường hợp góc tới i = 0 (tia truyền thẳng) vào thực tế sinh tồn." },
  { id: 13, type: 'tuluan', text: "So sánh điểm giống nhau và khác nhau cơ bản giữa hiện tượng phản xạ ánh sáng và khúc xạ ánh sáng.", answerText: "Giống: Cả hai đều xảy ra khi ánh sáng gặp mặt phân cách giữa hai môi trường.\nKhác: Phản xạ là tia sáng hắt trở lại môi trường cũ (góc phản xạ = góc tới). Khúc xạ là tia sáng xuyên qua môi trường thứ hai và bị gãy khúc (góc khúc xạ khác góc tới).", explanation: "Phát triển tư duy phân tích, phân biệt rõ bản chất hai hiện tượng quang học trên cùng một mặt phẳng ranh giới." },
  { id: 14, type: 'tuluan', text: "Vì sao khi ánh sáng truyền từ không khí vào nước thì góc khúc xạ lại nhỏ hơn góc tới?", answerText: "Vì nước có chiết suất lớn hơn không khí (nước chiết quang hơn không khí). Khi ánh sáng truyền từ môi trường chiết quang kém sang môi trường chiết quang hơn, tia khúc xạ bị bẻ gập lệch gần pháp tuyến hơn so với tia tới, do đó r < i.", explanation: "Đánh giá sự hiểu biết về mối quan hệ giữa mật độ quang học (chiết suất) và sự lệch hướng của tia sáng." },
  { id: 15, type: 'tuluan', text: "Giải thích vì sao khi tia sáng truyền từ nước ra không khí thì tia khúc xạ có xu hướng gần mặt phân cách hơn so với tia tới.", answerText: "Nước có chiết suất lớn hơn không khí. Khi đi từ môi trường chiết quang hơn (nước) sang kém hơn (không khí), tia khúc xạ bị lệch xa pháp tuyến hơn so với tia tới. Việc lệch xa pháp tuyến đồng nghĩa với việc nó ngả gần về phía mặt phân cách hơn.", explanation: "Luyện tập tư duy hình học không gian kết hợp quang học." }
];

  if (appState === 'result') { const isGoodScore=score>=8; return <div className="min-h-screen bg-slate-50 font-sans pb-12"><div className="bg-indigo-600 text-white pt-12 pb-24 px-4 text-center rounded-b-[3rem] shadow-xl"><h1 className="text-2xl sm:text-3xl font-bold mb-2">Kết quả của bạn</h1><p className="text-indigo-200">{studentInfo.name} - Lớp {studentInfo.class}</p></div><div className="max-w-3xl mx-auto -mt-16 px-4"><div className="bg-white rounded-2xl shadow-lg p-6 sm:p-8 flex flex-col sm:flex-row items-center justify-around mb-8 border border-slate-100"><div className="text-center mb-6 sm:mb-0"><p className="text-slate-500 font-medium mb-1">Điểm trắc nghiệm</p><div className="flex items-end justify-center"><span className={`text-6xl font-extrabold ${isGoodScore?'text-green-500':'text-amber-500'}`}>{score}</span><span className="text-2xl text-slate-400 mb-1 ml-1">/10</span></div><p className="text-xs text-slate-400 mt-2">*Tự luận chờ GV chấm</p></div><div className="h-16 w-px bg-slate-200 hidden sm:block"></div><div className="text-center"><p className="text-slate-500 font-medium mb-1">Thời gian</p><span className="text-3xl font-bold text-slate-700">{formatTime(elapsedTime)}</span></div></div><div className="flex justify-center mb-8"><button onClick={()=>{setAnswers({});setAppState('intro');}} className="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 font-bold py-3 px-6 rounded-xl flex items-center transition-all"><RefreshCcw className="w-5 h-5 mr-2"/> Thi lại (Cải thiện điểm)</button></div><h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center"><BookOpen className="text-indigo-500 mr-2"/> ĐÁP ÁN CHI TIẾT</h3><div className="space-y-6">{quizData.map((q,index)=><ResultCard key={q.id} q={q} index={index} answers={answers}/>)}</div></div></div>; }
  if (appState === 'teacherAuth') return <div className="min-h-screen bg-slate-800 flex items-center justify-center p-4 font-sans"><div className="max-w-md w-full bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl p-8 text-slate-300"><div className="text-center mb-6"><ShieldCheck className="w-12 h-12 text-teal-500 mx-auto mb-2"/><h2 className="text-2xl font-bold text-white">Chế Độ Giáo Viên</h2><p className="text-slate-400 text-sm">Vui lòng nhập mật khẩu quản trị viên</p></div><form onSubmit={handleTeacherLogin} className="space-y-4"><input type="password" value={teacherPwd} onChange={e=>setTeacherPwd(e.target.value)} className="w-full bg-slate-800 px-4 py-3 rounded-lg border border-slate-600 text-white focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all" placeholder="Mật khẩu (admin)"/>{teacherError&&<p className="text-red-400 text-sm mt-2 text-center">{teacherError}</p>}<div className="pt-2 flex flex-col space-y-3"><button type="submit" className="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-lg transition-all">Đăng nhập hệ thống</button><button type="button" onClick={()=>{setAppState('intro');setTeacherPwd('');setTeacherError('');}} className="w-full bg-transparent hover:bg-slate-800 text-slate-400 font-medium py-3 rounded-lg transition-all">Quay lại giao diện học sinh</button></div></form></div></div>;
  if (appState === 'teacherBoard') return <div className="min-h-screen bg-slate-50 font-sans relative">{deleteTarget&&<div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[100] p-4"><div className="bg-white rounded-2xl p-6 sm:p-8 max-w-sm w-full shadow-2xl"><div className="flex items-center text-red-600 mb-4"><AlertTriangle className="w-8 h-8 mr-3"/><h3 className="text-xl font-bold text-slate-800">Xác nhận xóa</h3></div><p className="text-slate-600 mb-8 leading-relaxed">{deleteTarget==='all'?'Bạn có chắc chắn muốn xóa TẤT CẢ dữ liệu bài làm của học sinh không? Hành động này không thể hoàn tác.':'Bạn có chắc chắn muốn xóa bài làm của học sinh này khỏi hệ thống không?'}</p><div className="flex justify-end space-x-3"><button onClick={()=>setDeleteTarget(null)} disabled={isDeleting} className="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded-xl">Hủy bỏ</button><button onClick={confirmDelete} disabled={isDeleting} className="px-5 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl">{isDeleting?'Đang xóa...':'Xóa dữ liệu'}</button></div></div></div>}<div className="bg-slate-900 text-white p-4 sm:p-6 shadow-md flex justify-between items-center sticky top-0 z-40"><div className="flex items-center"><ShieldCheck className="w-6 h-6 sm:w-8 sm:h-8 text-teal-400 mr-3"/><div><h1 className="text-lg sm:text-xl font-bold">Bảng Điều Khiển Giáo Viên</h1><p className="text-[10px] sm:text-xs text-slate-400">Hệ thống lượng giá KHTN 9 - Bài 5 (Mức 2)</p></div></div><button onClick={()=>setAppState('intro')} className="flex items-center px-3 sm:px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm font-medium border border-slate-700"><LogOut className="w-4 h-4 sm:mr-2"/> <span className="hidden sm:inline">Thoát</span></button></div><div className="p-4 sm:p-8 max-w-7xl mx-auto"><div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><div className="p-4 sm:p-6 border-b border-slate-200 bg-slate-50 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"><h2 className="text-lg font-bold text-slate-800">Thống kê bài làm học sinh (Thông hiểu)</h2><div className="flex items-center space-x-3"><span className="bg-teal-100 text-teal-800 px-3 py-1.5 rounded-lg text-sm font-bold border border-teal-200">Tổng cộng: {resultsData.length} lượt</span>{resultsData.length>0&&<button onClick={()=>setDeleteTarget('all')} className="flex items-center px-3 py-1.5 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg text-sm font-semibold border border-red-200"><Trash2 className="w-4 h-4 mr-1.5"/> Xóa tất cả</button>}</div></div><div className="overflow-x-auto"><table className="w-full text-left border-collapse whitespace-nowrap"><thead><tr className="bg-slate-100 text-slate-600 text-sm border-b border-slate-200"><th className="p-4 font-semibold">Thời gian nộp</th><th className="p-4 font-semibold">Họ Tên</th><th className="p-4 font-semibold">Lớp</th><th className="p-4 font-semibold">Trường</th><th className="p-4 font-semibold text-center">Điểm</th><th className="p-4 font-semibold text-center">Thời gian làm</th><th className="p-4 font-semibold text-center">Thao tác</th></tr></thead><tbody className="text-sm">{resultsData.length===0?<tr><td colSpan="7" className="p-12 text-center text-slate-500"><BookOpen className="w-12 h-12 mx-auto text-slate-300 mb-3"/>Chưa có dữ liệu bài làm nào.</td></tr>:resultsData.map((res,i)=><tr key={res.id||i} className="border-b border-slate-100 hover:bg-slate-50"><td className="p-4 text-slate-500">{res.timestamp?new Date(res.timestamp.toMillis()).toLocaleString('vi-VN'):'Đang tải...'}</td><td className="p-4 font-bold text-slate-800">{res.studentName}</td><td className="p-4 text-slate-700">{res.studentClass}</td><td className="p-4 text-slate-600">{res.studentSchool}</td><td className="p-4 text-center"><span className={`font-bold px-2.5 py-1 rounded-md ${res.score>=8?'bg-green-100 text-green-700':res.score>=5?'bg-amber-100 text-amber-700':'bg-red-100 text-red-700'}`}>{res.score}/10</span></td><td className="p-4 text-center font-mono text-slate-500">{formatTime(res.timeSpent)}</td><td className="p-4 text-center"><button onClick={()=>setDeleteTarget(res.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg" title="Xóa bài làm này"><Trash2 className="w-4 h-4"/></button></td></tr>)}</tbody></table></div></div></div></div>;
  return null;
}

function QuestionCard({q,index,answers,handleAnswerSelect}) { return <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden"><div className="bg-slate-50 border-b border-slate-100 px-4 sm:px-6 py-3 flex justify-between items-center"><span className="font-bold text-slate-700">Câu {index+1}</span><span className="text-xs font-semibold px-2 py-1 rounded bg-slate-200 text-slate-600 uppercase">{q.type==='tuluan'?'Tự Luận':q.type==='tracnghiem'?'Trắc Nghiệm':'Đúng/Sai'}</span></div><div className="p-4 sm:p-6"><p className="text-base sm:text-lg text-slate-800 font-medium mb-4 leading-relaxed">{q.text}</p>{q.needsImage&&<ImagePlaceholder note={q.imageNote}/>} {q.type==='tuluan'&&<textarea value={answers[q.id]||''} onChange={e=>handleAnswerSelect(q.id,e.target.value)} placeholder="Nhập câu trả lời của bạn vào đây..." className="w-full h-24 p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none text-slate-700"></textarea>} {q.type==='tracnghiem'&&<div className="space-y-3">{q.options.map((opt,i)=><label key={i} className={`flex items-center p-3 sm:p-4 rounded-xl border cursor-pointer transition-all ${answers[q.id]===i?'bg-indigo-50 border-indigo-500 shadow-sm':'border-slate-200 hover:bg-slate-50'}`}><input type="radio" name={`q-${q.id}`} className="w-4 h-4 text-indigo-600 focus:ring-indigo-500 border-slate-300" checked={answers[q.id]===i} onChange={()=>handleAnswerSelect(q.id,i)}/><span className="ml-3 text-slate-700">{opt}</span></label>)}</div>} {q.type==='dungsai'&&<div className="flex space-x-4"><button onClick={()=>handleAnswerSelect(q.id,'Đúng')} className={`flex-1 py-4 rounded-xl border font-bold transition-all ${answers[q.id]==='Đúng'?'bg-green-50 border-green-500 text-green-700 shadow-sm':'border-slate-200 text-slate-600 hover:bg-slate-50'}`}>Đúng</button><button onClick={()=>handleAnswerSelect(q.id,'Sai')} className={`flex-1 py-4 rounded-xl border font-bold transition-all ${answers[q.id]==='Sai'?'bg-red-50 border-red-500 text-red-700 shadow-sm':'border-slate-200 text-slate-600 hover:bg-slate-50'}`}>Sai</button></div>}</div></div>; }
function ResultCard({q,index,answers}) { const isObj=q.type==='tracnghiem'||q.type==='dungsai'; const isCorrect=isObj&&answers[q.id]===q.correctOption; const studentAnswerStr=q.type==='tracnghiem'&&answers[q.id]!==undefined?q.options[answers[q.id]]:answers[q.id]; return <div className={`bg-white rounded-xl shadow-sm border overflow-hidden ${isObj?(isCorrect?'border-green-300':'border-red-300'):'border-blue-300'}`}><div className={`px-4 py-2 font-medium flex items-center justify-between text-sm ${isObj?(isCorrect?'bg-green-50 text-green-800':'bg-red-50 text-red-800'):'bg-blue-50 text-blue-800'}`}><span>Câu {index+1}: <span className="hidden sm:inline">{q.type==='tuluan'?'Tự Luận':q.type==='tracnghiem'?'Trắc Nghiệm':'Đúng/Sai'}</span></span>{isObj?(isCorrect?<CheckCircle2 className="w-5 h-5 text-green-500"/>:<XCircle className="w-5 h-5 text-red-500"/>):<span className="bg-blue-200 text-blue-800 px-2 py-0.5 rounded text-xs">Chờ chấm</span>}</div><div className="p-4 sm:p-5"><p className="text-sm sm:text-base text-slate-800 font-medium mb-3">{q.text}</p>{q.needsImage&&<ImagePlaceholder note={q.imageNote}/>}<div className="mb-4 bg-slate-50 p-3 rounded border border-slate-100"><p className="text-sm text-slate-500 mb-1">Bài làm của bạn:</p><p className={`font-medium ${isObj?(isCorrect?'text-green-600':'text-red-600'):'text-slate-700'}`}>{studentAnswerStr||<span className="italic text-slate-400">Không có câu trả lời</span>}</p></div><div className="bg-indigo-50/50 p-4 rounded-lg border border-indigo-100"><p className="text-sm text-indigo-800 font-bold mb-1">Đáp án gợi ý / Chính xác:</p><p className="font-medium text-slate-800 mb-3">{q.answerText}</p><div className="flex items-start"><AlertCircle className="w-4 h-4 text-amber-500 mr-2 mt-0.5 shrink-0"/><p className="text-sm text-slate-600"><span className="font-semibold text-slate-700">Giải thích:</span> {q.explanation}</p></div></div></div></div>; }

createRoot(document.getElementById('root')).render(<App/>);

  </script>
</body>
</html>
