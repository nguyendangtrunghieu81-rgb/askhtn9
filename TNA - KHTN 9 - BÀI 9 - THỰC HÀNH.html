<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đo tiêu cự thấu kính (Bí kíp Silbermann)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (Dịch JSX sang JS) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Font chữ chuẩn cho công thức Toán/Lý */
        .font-math {
            font-family: "Cambria Math", "Times New Roman", serif;
            font-style: italic;
        }

        /* CSS cho thanh cuộn tùy chỉnh */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f8fafc;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;

        // COMPONENT HIỂN THỊ PHÂN SỐ TOÁN HỌC CHUẨN
        const MathFrac = ({ num, den, color = "border-current" }) => (
          <span className="inline-flex flex-col items-center justify-center align-middle mx-1 text-[0.9em] font-math">
            <span className={`border-b-2 ${color} px-1 pb-[1px] leading-none`}>{num}</span>
            <span className="px-1 pt-[2px] leading-none">{den}</span>
          </span>
        );

        const App = () => {
          // CẤU HÌNH VẬT LÝ VÀ HIỂN THỊ
          const f_ref = 15; // Tiêu cự tham chiếu (cm)
          const h = 6; // Chiều cao vật (cm)
          const scale = 6; // Tỉ lệ px/cm trên SVG
          const centerX = 400; // Tọa độ X quang tâm
          const centerY = 130; // Tọa độ Y quang trục
          const maxD = 45; // Khoảng cách tối đa (cm)
          const minD = 10; // Khoảng cách tối thiểu (cm)

          // STATE
          const [d, setD] = useState(12); // Khoảng cách từ vật đến thấu kính
          const [records, setRecords] = useState([]); // Lưu các lần đo
          const [showRays, setShowRays] = useState(true); // Ẩn/hiện tia sáng
          const [showHint, setShowHint] = useState(false); // Ẩn/hiện gợi ý

          // DRAG & DROP STATE
          const svgRef = useRef(null);
          const [isDragging, setIsDragging] = useState(null); // 'object' hoặc 'screen'

          // TÍNH TOÁN QUANG HỌC
          // Xử lý d = f để tránh lỗi Infinity
          const dPrime_true = d === f_ref ? Infinity : (d * f_ref) / (d - f_ref); 
          const screenPos = d; // Do bố trí đối xứng, d' của màn luôn bằng d
          
          // Tính độ mờ (blur) của ảnh trên màn
          const isVirtual = d <= f_ref;
          const blurAmount = isVirtual ? 20 : Math.min(Math.abs(dPrime_true - screenPos) * 1.5, 20);
          
          // Kiểm tra điều kiện có thể chốt kết quả (sai số nhỏ +- 0.5 cm quanh vị trí 2f = 30cm)
          const isSharp = !isVirtual && blurAmount < 1.0;

          // PHẢN HỒI TỰ ĐỘNG
          const feedbackMsg = useMemo(() => {
            if (d <= f_ref) return "Ối dồi ôi! Vật nằm trong tiêu cự mất tiêu rồi. Ảnh ảo, không hứng được trên màn đâu nha! 🫣";
            if (d > f_ref && d < 2 * f_ref - 3) return "Mờ câm à! Màn và ảnh đang 'xa mặt cách lòng'. Kéo vật và màn ra xa thấu kính thêm nữa đi! 🔭";
            if (d >= 2 * f_ref - 3 && d < 2 * f_ref - 0.5) return "Đang rõ dần rồi kìa! Chậm lại, nhích từng li thôi! Sắp thành 'chính quả' rồi! 🤫";
            if (Math.abs(d - 2 * f_ref) <= 0.5) return "Bingo! Nét như Sony! 🎯 Ảnh và vật bằng nhau y đúc. Chốt đơn ngay và luôn! ✅";
            if (d > 2 * f_ref + 0.5 && d <= 2 * f_ref + 3) return "Ui da, kéo lố tay rồi! Ảnh bắt đầu 'say xe' mờ đi kìa. Kéo ngược lại xíu xiu! 🔙";
            return "Trời ơi xa tít mù tắp, ảnh hiện ra phía trước màn nên bị mờ rịt. Kéo chúng lại gần thấu kính xíu đi! 😫";
          }, [d]);

          // HÀM XỬ LÝ
          const handleRecord = () => {
            if (records.length < 3) {
              const newRecord = {
                id: records.length + 1,
                h: h,
                hPrime: h, // Khi nét h' = h
                d: parseFloat(d),
                dPrime: parseFloat(d),
                f_calc: ((parseFloat(d) + parseFloat(d)) / 4).toFixed(2)
              };
              setRecords([...records, newRecord]);
            }
          };

          const resetExperiment = () => {
            setRecords([]);
            setD(12);
          };

          // DRAG HANDLERS
          const handlePointerMove = (e) => {
            if (!isDragging || !svgRef.current) return;
            const rect = svgRef.current.getBoundingClientRect();
            const svgX = (e.clientX - rect.left) * (800 / rect.width);
            
            let newD = d;
            if (isDragging === 'object') {
              newD = (centerX - svgX) / scale;
            } else if (isDragging === 'screen') {
              newD = (svgX - centerX) / scale;
            }
            
            newD = Math.max(minD, Math.min(maxD, newD));
            setD(newD);
          };

          // TÍNH TRUNG BÌNH
          const avgD = records.length === 3 ? (records.reduce((a, b) => a + b.d, 0) / 3).toFixed(2) : 0;
          const avgDPrime = records.length === 3 ? (records.reduce((a, b) => a + b.dPrime, 0) / 3).toFixed(2) : 0;
          const avgF = records.length === 3 ? ((parseFloat(avgD) + parseFloat(avgDPrime)) / 4).toFixed(2) : 0;

          // COMPONENT VẼ MŨI TÊN (VẬT SÁNG) CHUẨN QUANG HỌC
          const ObjectArrow = ({ x, y, hScale, color, blur = 0, isScreen = false }) => {
            const actualH = h * scale * Math.abs(hScale);
            const sign = Math.sign(hScale) || 1; // 1 là hướng lên, -1 là hướng xuống
            const tipY = y - actualH * sign;
            
            return (
              <g>
                {blur > 0 && isScreen && (
                  <filter id={`blur-${blur.toFixed(1)}`}>
                    <feGaussianBlur in="SourceGraphic" stdDeviation={blur} />
                  </filter>
                )}
                <g filter={blur > 0 && isScreen ? `url(#blur-${blur.toFixed(1)})` : ""}>
                  {/* Thân mũi tên */}
                  <line x1={x} y1={y} x2={x} y2={tipY} stroke={color} strokeWidth="3.5" strokeLinecap="round" className={!isScreen ? "drop-shadow-md" : ""} />
                  {/* Đầu mũi tên */}
                  <polygon points={`${x},${tipY - 5 * sign} ${x - 5},${tipY + 5 * sign} ${x + 5},${tipY + 5 * sign}`} fill={color} />
                </g>
                {/* Chấm đỏ nguồn sáng (chỉ vẽ cho vật thật để báo vị trí xuất phát tia) */}
                {!isScreen && <circle cx={x} cy={tipY} r="3" fill="#dc2626" />}
              </g>
            );
          };

          return (
            <div className="min-h-screen bg-[#f3f4f6] font-sans text-slate-800 p-3 md:p-6 pb-20">
              <div className="max-w-6xl mx-auto space-y-5">
                
                {/* HEADER */}
                <header className="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl shadow-lg p-5 md:p-6 text-white text-center md:text-left relative overflow-hidden">
                  <div className="relative z-10">
                    <h1 className="text-xl md:text-3xl font-extrabold drop-shadow-md">
                      🔬 Đo tiêu cự thấu kính (Bí kíp Silbermann)
                    </h1>
                    <p className="mt-2 text-blue-100 text-sm md:text-base font-medium">
                      Tuyệt chiêu: Kéo <strong>đồng thời & đối xứng</strong> vật và màn để tìm bức ảnh hoàn hảo!
                    </p>
                  </div>
                  {/* Background decoration */}
                  <div className="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
                  <div className="absolute bottom-0 right-20 w-24 h-24 bg-blue-300 opacity-20 rounded-full blur-xl"></div>
                </header>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-5">
                  
                  {/* CỘT TRÁI: MÔ PHỎNG & ĐIỀU KHIỂN */}
                  <div className="lg:col-span-7 space-y-5">
                    
                    {/* KHU VỰC THÍ NGHIỆM */}
                    <div className="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden flex flex-col">
                      {/* Thanh trạng thái Giáo viên ảo */}
                      <div className={`p-4 font-medium flex items-start gap-3 transition-colors ${
                        isSharp ? 'bg-green-100 text-green-800' : 
                        d <= f_ref ? 'bg-red-50 text-red-700' : 'bg-amber-50 text-amber-800'
                      }`}>
                        <span className="text-2xl drop-shadow-sm">🦉</span>
                        <p className="leading-tight pt-1"><strong>Giáo sư Cú:</strong> {feedbackMsg}</p>
                      </div>

                      {/* Toggles */}
                      <div className="px-4 py-2 bg-slate-50 border-y border-slate-100 flex justify-end gap-4 text-sm font-semibold text-slate-600">
                        <label className="flex items-center gap-2 cursor-pointer hover:text-blue-600 transition-colors">
                          <input type="checkbox" checked={showRays} onChange={(e) => setShowRays(e.target.checked)} className="w-4 h-4 accent-blue-600 rounded"/>
                          ✨ Hiện tia sáng
                        </label>
                      </div>
                      
                      {/* Bản vẽ SVG Responsive */}
                      <div className="w-full bg-[#f8fafc] relative">
                        <svg ref={svgRef} viewBox="0 0 800 280" className="w-full h-auto drop-shadow-sm select-none" preserveAspectRatio="xMidYMid meet">
                          
                          {/* Lưới nền */}
                          <defs>
                            <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                              <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" strokeWidth="0.5"/>
                            </pattern>
                          </defs>
                          <rect width="100%" height="100%" fill="url(#grid)" />

                          {/* Trục chính */}
                          <line x1="0" y1={centerY} x2="800" y2={centerY} stroke="#64748b" strokeWidth="2.5" />
                          
                          {/* Thước kẻ (Giá quang học) */}
                          <rect x="0" y={centerY + 30} width="800" height="24" fill="#cbd5e1" rx="4" />
                          <rect x="0" y={centerY + 40} width="800" height="2" fill="#94a3b8" />
                          {Array.from({ length: 81 }).map((_, i) => (
                            <line key={i} x1={i * 10} y1={centerY + 30} x2={i * 10} y2={i % 5 === 0 ? centerY + 42 : centerY + 36} stroke="#475569" strokeWidth="1.5" />
                          ))}
                          
                          {/* Thấu kính */}
                          <g>
                            <path d={`M 400 ${centerY - 65} Q 412 ${centerY} 400 ${centerY + 65} Q 388 ${centerY} 400 ${centerY - 65}`} fill="#38bdf8" stroke="#0284c7" strokeWidth="2" opacity="0.6" />
                            <line x1="400" y1={centerY - 80} x2="400" y2={centerY + 80} stroke="#0284c7" strokeWidth="1.5" strokeDasharray="4,2"/>
                            <text x="408" y={centerY - 85} fontSize="16" fill="#0369a1" fontWeight="900" style={{fontFamily: 'sans-serif'}}>L</text>
                            <circle cx="400" cy={centerY} r="3" fill="#0284c7" />
                            <text x="388" y={centerY + 18} fontSize="14" fill="#0369a1" fontWeight="bold">O</text>
                          </g>
                          
                          {/* Tiêu điểm */}
                          <circle cx={centerX - f_ref * scale} cy={centerY} r="4" fill="#334155" />
                          <text x={centerX - f_ref * scale - 6} y={centerY + 22} fontSize="14" fill="#334155" fontWeight="bold">F</text>
                          <circle cx={centerX + f_ref * scale} cy={centerY} r="4" fill="#334155" />
                          <text x={centerX + f_ref * scale - 8} y={centerY + 22} fontSize="14" fill="#334155" fontWeight="bold">F'</text>

                          {/* VẬT SÁNG (Dùng mũi tên thẳng, không nhãn chữ "Vật") */}
                          <ObjectArrow x={centerX - d * scale} y={centerY} hScale={1} color="#f97316" />
                          <rect x={centerX - d * scale - 6} y={centerY} width="12" height="6" fill="#475569" rx="2"/> {/* Chân đế nhỏ gọn */}
                          
                          {/* Ký hiệu Kéo Vật (Mũi tên 2 chiều) */}
                          <text x={centerX - d * scale} y={centerY + 20} fontSize="12" fill="#ea580c" textAnchor="middle" fontWeight="bold" className="animate-pulse pointer-events-none select-none">↔ Kéo</text>

                          {/* HITBOX ĐỂ KÉO VẬT SÁNG */}
                          <rect 
                            x={centerX - d * scale - 20} 
                            y={centerY - h * scale - 10} 
                            width="40" 
                            height={h * scale + 40} 
                            fill="transparent" 
                            cursor="ew-resize"
                            style={{ touchAction: 'none' }}
                            onPointerDown={(e) => {
                              setIsDragging('object');
                              e.target.setPointerCapture(e.pointerId);
                              e.preventDefault();
                            }}
                            onPointerMove={handlePointerMove}
                            onPointerUp={(e) => {
                              setIsDragging(null);
                              try { e.target.releasePointerCapture(e.pointerId); } catch(err) {}
                            }}
                          />
                          
                          {/* MÀN CHẮN */}
                          <rect x={centerX + d * scale - 3} y={centerY - 90} width="6" height="180" fill="#94a3b8" stroke="#334155" strokeWidth="1.5" rx="2" opacity="0.9"/>
                          
                          {/* Ký hiệu Kéo Màn */}
                          <text x={centerX + d * scale} y={centerY + 105} fontSize="12" fill="#475569" textAnchor="middle" fontWeight="bold" className="animate-pulse pointer-events-none select-none">↔ Kéo</text>

                          {/* HITBOX ĐỂ KÉO MÀN CHẮN */}
                          <rect 
                            x={centerX + d * scale - 20} 
                            y={centerY - 90} 
                            width="40" 
                            height="200" 
                            fill="transparent" 
                            cursor="ew-resize"
                            style={{ touchAction: 'none' }}
                            onPointerDown={(e) => {
                              setIsDragging('screen');
                              e.target.setPointerCapture(e.pointerId);
                              e.preventDefault();
                            }}
                            onPointerMove={handlePointerMove}
                            onPointerUp={(e) => {
                              setIsDragging(null);
                              try { e.target.releasePointerCapture(e.pointerId); } catch(err) {}
                            }}
                          />
                          
                          {/* ẢNH TRÊN MÀN (Ảnh ngược) */}
                          {d > f_ref && (
                            <ObjectArrow 
                              x={centerX + d * scale} 
                              y={centerY} 
                              hScale={-1} // Theo phương pháp Silbermann ảnh bằng vật nhưng ngược chiều
                              color="#10b981" 
                              blur={blurAmount}
                              isScreen={true}
                            />
                          )}

                          {/* TIA SÁNG */}
                          {showRays && !isVirtual && (
                            <g opacity="0.75">
                              <line x1={centerX - d * scale} y1={centerY - h * scale} x2={centerX} y2={centerY - h * scale} stroke="#f43f5e" strokeWidth="2" />
                              <line x1={centerX} y1={centerY - h * scale} x2={800} y2={centerY + (800 - centerX) * (h * scale) / (f_ref * scale) - h*scale} stroke="#f43f5e" strokeWidth="2" />
                              <line x1={centerX - d * scale} y1={centerY - h * scale} x2={800} y2={centerY + (800 - centerX) * (h * scale) / (d * scale)} stroke="#f43f5e" strokeWidth="2" />
                              
                              {Number.isFinite(dPrime_true) && dPrime_true > 0 && dPrime_true * scale < 400 && (
                                <circle cx={centerX + dPrime_true * scale} cy={centerY + (h * dPrime_true / d) * scale} r="4" fill="#10b981" className="animate-pulse" />
                              )}
                            </g>
                          )}
                          
                          {/* Ký hiệu d, d' */}
                          <path d={`M ${centerX - d*scale} ${centerY+65} L ${centerX} ${centerY+65}`} stroke="#0284c7" strokeWidth="2" markerStart="url(#arrowBlue)" markerEnd="url(#arrowBlue)" strokeDasharray="4,4"/>
                          <rect x={centerX - (d*scale)/2 - 12} y={centerY+55} width="24" height="20" fill="white" rx="4" />
                          <text x={centerX - (d*scale)/2 - 4} y={centerY+69} fontSize="14" fill="#0284c7" fontWeight="bold">d</text>
                          
                          <path d={`M ${centerX} ${centerY+65} L ${centerX + d*scale} ${centerY+65}`} stroke="#10b981" strokeWidth="2" markerStart="url(#arrowGreen)" markerEnd="url(#arrowGreen)" strokeDasharray="4,4"/>
                          <rect x={centerX + (d*scale)/2 - 12} y={centerY+55} width="24" height="20" fill="white" rx="4" />
                          <text x={centerX + (d*scale)/2 - 6} y={centerY+69} fontSize="14" fill="#10b981" fontWeight="bold">d'</text>
                          
                          <defs>
                            <marker id="arrowBlue" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                              <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7" />
                            </marker>
                            <marker id="arrowGreen" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                              <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
                            </marker>
                          </defs>
                        </svg>
                      </div>

                      {/* KHU VỰC ĐIỀU KHIỂN TÍCH HỢP TRỰC TIẾP */}
                      <div className="p-4 md:p-6 bg-white border-t border-slate-200 shadow-[0_-10px_20px_rgba(0,0,0,0.02)]">
                        <label className="flex flex-col md:flex-row md:items-center justify-between gap-2 mb-4 font-bold text-slate-700">
                          <span className="text-lg">Kéo thanh này để dịch 🚀</span>
                          <span className="text-blue-600 bg-blue-50 px-3 py-1 rounded-full text-sm">
                            d = d' = {d.toFixed(1)} cm
                          </span>
                        </label>
                        
                        <div className="flex items-center gap-3">
                          <span className="text-xl text-slate-400">🔍</span>
                          <input 
                            type="range" 
                            min={minD} 
                            max={maxD} 
                            step="0.1" 
                            value={d}
                            onChange={(e) => setD(parseFloat(e.target.value))}
                            className="flex-1 h-3 bg-slate-200 rounded-full appearance-none cursor-pointer accent-indigo-600 hover:accent-indigo-500 transition-all"
                          />
                          <span className="text-xl text-slate-400">🔭</span>
                        </div>

                        <div className="mt-6 flex gap-3 justify-center">
                          <button 
                            onClick={handleRecord}
                            disabled={!isSharp || records.length >= 3}
                            className={`flex-1 md:flex-none px-6 py-3 rounded-xl font-bold text-white transition-all transform active:scale-95 flex items-center justify-center gap-2 ${
                              !isSharp || records.length >= 3 
                              ? 'bg-slate-300 cursor-not-allowed opacity-70' 
                              : 'bg-gradient-to-r from-emerald-500 to-green-500 shadow-lg shadow-green-200 hover:shadow-xl'
                            }`}
                          >
                            {records.length >= 3 ? "🏁 Đã xong 3 lần" : "📸 Chốt kết quả đo"}
                          </button>
                          <button 
                            onClick={resetExperiment}
                            className="px-4 py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 hover:text-slate-700 transition-all transform active:scale-95"
                            title="Làm lại từ đầu"
                          >
                            🔄 Lại
                          </button>
                        </div>
                      </div>
                    </div>

                    {/* HƯỚNG DẪN DÍ DỎM */}
                    <div className="bg-indigo-50 rounded-2xl p-5 border border-indigo-100">
                      <h3 className="font-extrabold text-indigo-800 mb-3 text-lg">💡 Bí kíp thao tác:</h3>
                      <ol className="list-decimal list-inside space-y-2 text-indigo-900 font-medium text-sm md:text-base">
                        <li>Vật mũi tên được khóa cứng chiều cao <span className="bg-indigo-100 px-1 rounded">h = 6cm</span>.</li>
                        <li>Dùng thanh trượt kì diệu bên trên hoặc <strong>kéo đẩy trực tiếp vào Vật/Màn</strong> để dịch chuyển đồng thời.</li>
                        <li>Mắt chữ O mồm chữ A nhìn vào màn hứng ảnh, dừng lại khi thấy nó <strong>NÉT NHẤT CÓ THỂ</strong>.</li>
                        <li>Nhấn mạnh nút <span className="text-green-600">"Chốt kết quả đo"</span>.</li>
                        <li>Cố tình làm lệch đi chút xíu rồi tìm lại điểm nét để đo đủ 3 lần cho chuẩn dân chơi khoa học nhé! 😎</li>
                      </ol>
                    </div>
                  </div>

                  {/* CỘT PHẢI: DỮ LIỆU & LÝ THUYẾT */}
                  <div className="lg:col-span-5 space-y-5">
                    
                    {/* BẢNG DỮ LIỆU NỔI BẬT */}
                    <div className="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                      <div className="bg-slate-800 p-4 text-center">
                        <h2 className="font-extrabold text-white text-lg tracking-wide">📊 SỔ TAY KẾT QUẢ</h2>
                      </div>
                      <div className="p-0 overflow-x-auto custom-scrollbar">
                        <table className="w-full text-center">
                          <thead className="bg-slate-100 text-slate-500 font-bold text-sm uppercase tracking-wider">
                            <tr>
                              <th className="py-3 px-2">Lần</th>
                              <th className="py-3 px-2">d (cm)</th>
                              <th className="py-3 px-2">d' (cm)</th>
                              <th className="py-3 px-2 text-indigo-600">f (cm)</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100 font-medium">
                            {records.map((rec, idx) => (
                              <tr key={idx} className="hover:bg-blue-50 transition-colors">
                                <td className="py-3 text-slate-500">#{rec.id}</td>
                                <td className="py-3 text-blue-600">{rec.d.toFixed(1)}</td>
                                <td className="py-3 text-emerald-600">{rec.dPrime.toFixed(1)}</td>
                                <td className="py-3 text-indigo-600 font-bold">{rec.f_calc}</td>
                              </tr>
                            ))}
                            {records.length === 0 && (
                              <tr>
                                <td colSpan="4" className="py-10 text-slate-400 italic">Chưa có gì cả! Hãy làm thử 1 lần xem sao 😉</td>
                              </tr>
                            )}
                            {records.length > 0 && records.length < 3 && (
                              <tr>
                                <td colSpan="4" className="py-3 bg-slate-50 text-slate-400 animate-pulse">👉 Đang chờ lần đo thứ {records.length + 1}...</td>
                              </tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                      
                      {/* PHẦN TÍNH TRUNG BÌNH (Dùng phân số toán học) */}
                      {records.length === 3 && (
                        <div className="p-5 bg-gradient-to-br from-green-50 to-emerald-100 border-t border-emerald-200">
                          <h3 className="font-extrabold text-emerald-800 mb-3 flex items-center gap-2">
                            <span>🏆</span> Kết quả chung cuộc:
                          </h3>
                          <div className="grid grid-cols-2 gap-3 text-sm text-emerald-900 mb-4">
                            <div className="bg-white/60 p-2 rounded-lg text-center border border-emerald-200/50">
                              <span className="block text-xs uppercase opacity-70">d (trung bình)</span>
                              <strong className="text-lg">{avgD}</strong>
                            </div>
                            <div className="bg-white/60 p-2 rounded-lg text-center border border-emerald-200/50">
                              <span className="block text-xs uppercase opacity-70">d' (trung bình)</span>
                              <strong className="text-lg">{avgDPrime}</strong>
                            </div>
                          </div>
                          
                          {/* BẢNG TÍNH TOÁN HIỂN THỊ CHUẨN TOÁN HỌC */}
                          <div className="bg-white p-5 rounded-xl shadow-sm border border-emerald-300 text-center relative overflow-hidden">
                            <div className="text-xs text-slate-500 font-bold mb-3 uppercase tracking-wider">Tiêu cự thấu kính</div>
                            <div className="flex items-center justify-center text-xl font-black text-indigo-700 flex-wrap">
                              <span>f =</span>
                              <MathFrac num="d + d'" den="4" color="border-indigo-700" />
                              <span className="mx-1">=</span>
                              <MathFrac num={`${avgD} + ${avgDPrime}`} den="4" color="border-indigo-700" />
                              <span className="ml-2 text-2xl text-emerald-600">= {avgF} cm 🎉</span>
                            </div>
                            <div className="absolute -top-3 -right-3 text-3xl animate-bounce">🎊</div>
                          </div>
                          
                          <div className="mt-4 text-xs font-medium text-emerald-800 bg-white/50 p-2 rounded border border-emerald-200 border-dashed text-center">
                            Ghi chú: Tại vị trí này, ảnh thật ngược chiều và to bằng y chang vật thật (h' = h = 6cm).
                          </div>
                        </div>
                      )}
                    </div>

                    {/* KIẾN THỨC BỎ TÚI (Dùng phân số toán học) */}
                    <div className="bg-white rounded-3xl shadow-xl border border-slate-100 p-5 md:p-6">
                      <div className="flex justify-between items-center mb-5">
                        <h2 className="font-extrabold text-slate-800 text-lg">🤔 Chuyên mục Hại Não</h2>
                        <button 
                          onClick={() => setShowHint(!showHint)}
                          className={`text-xs px-4 py-2 rounded-full font-bold transition-colors ${showHint ? 'bg-amber-100 text-amber-700' : 'bg-blue-100 text-blue-700 hover:bg-blue-200'}`}
                        >
                          {showHint ? "🫣 Giấu phao đi" : "🆘 Xem phao cứu sinh"}
                        </button>
                      </div>
                      
                      <div className="space-y-3 text-sm md:text-base">
                        <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100 transition-all hover:border-blue-200 hover:shadow-md">
                          <p className="font-bold text-slate-700 flex gap-2"><span>1️⃣</span> Tại sao lúc nào d cũng bằng d' thế?</p>
                          {showHint && (
                            <p className="mt-3 text-blue-700 bg-blue-50 p-3 rounded-xl border border-blue-100">
                              Vì luật chơi của phương pháp đối xứng Silbermann quy định thế! Ta cố tình xếp vật và màn cách thấu kính những khoảng bằng nhau và dịch chuyển chúng cùng lúc.
                            </p>
                          )}
                        </div>

                        <div className="p-4 bg-slate-50 rounded-2xl border border-slate-100 transition-all hover:border-purple-200 hover:shadow-md">
                          <p className="font-bold text-slate-700 flex gap-2"><span>2️⃣</span> Chứng minh công thức <span className="inline-flex align-middle">f = <MathFrac num="d+d'" den="4" /></span> xem nào!</p>
                          {showHint && (
                            <div className="mt-3 text-purple-800 bg-purple-50 p-4 rounded-xl border border-purple-200 space-y-4 font-medium text-base">
                              <div className="flex items-center gap-3">
                                <span>• Phương trình gốc:</span>
                                <div className="flex items-center">
                                  <MathFrac num="1" den="f" /> <span>=</span> <MathFrac num="1" den="d" /> <span>+</span> <MathFrac num="1" den="d'" />
                                </div>
                              </div>
                              <div className="flex items-center gap-3">
                                <span>• Vì cố tình ép <strong className="text-purple-900">d = d'</strong> nên:</span>
                                <div className="flex items-center">
                                  <MathFrac num="1" den="f" /> <span>=</span> <MathFrac num="2" den="d" />
                                  <span className="ml-4 italic text-sm text-purple-600">=&gt; d = 2f</span>
                                </div>
                              </div>
                              <div className="flex items-center gap-3 border-t border-purple-200 pt-3">
                                <span>• Túm lại: <span className="inline-flex align-middle">f = <MathFrac num="d" den="2"/></span></span>
                                <span>. Thay <strong className="text-purple-900">d = d'</strong> ta có:</span>
                                <div className="flex items-center text-lg font-bold bg-white px-3 py-1 rounded shadow-sm">
                                  f = <MathFrac num="d + d'" den="4" />
                                </div>
                              </div>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>

                  </div>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
